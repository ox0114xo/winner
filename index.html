<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinnerFlow 贏家決策系統 (旗艦版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-gray-800 font-sans antialiased p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-gradient-to-r from-blue-900 to-indigo-800 text-white p-6 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">🛡️ WinnerFlow 贏家決策系統</h1>
                <p class="mt-2 text-blue-200 text-sm">自動抓價 ‧ 摩擦成本試算 ‧ 動態停利 ‧ 記憶儲存</p>
            </div>
            <button id="fetch_btn" onclick="fetchMarketData()" class="mt-4 md:mt-0 bg-blue-600 hover:bg-blue-500 text-white py-2 px-4 rounded-lg font-bold shadow transition-all flex items-center gap-2">
                <span id="fetch_icon">🔄</span> <span id="fetch_text">抓取最新市價與匯率</span>
            </button>
        </div>

        <div class="p-6 md:flex gap-8">
            <div class="md:w-1/2 space-y-4">
                <div class="flex justify-between items-end border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-800">📝 1. 自訂資產參數</h2>
                    <span class="text-xs text-green-600 bg-green-100 px-2 py-1 rounded">💾 已啟用自動記憶</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">0050 買進均價 (TWD)</label>
                        <input type="number" id="cost_price" class="w-full border-2 border-gray-200 rounded-lg p-2 mt-1 focus:border-blue-500 focus:outline-none transition-colors" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">0050 目前市價 (TWD)</label>
                        <input type="number" id="current_price" class="w-full border-2 border-gray-200 rounded-lg p-2 mt-1 focus:border-blue-500 focus:outline-none transition-colors" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">持有股數</label>
                        <input type="number" id="shares" class="w-full border-2 border-gray-200 rounded-lg p-2 mt-1 focus:border-blue-500 focus:outline-none transition-colors" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600">目前匯率 (USD/TWD)</label>
                        <input type="number" id="fx_rate" step="0.1" class="w-full border-2 border-gray-200 rounded-lg p-2 mt-1 focus:border-blue-500 focus:outline-none transition-colors" oninput="calculate()">
                    </div>
                </div>

                <div class="pt-4 border-t mt-4">
                    <label class="block text-sm font-semibold text-gray-600">QQQ 現有資產 (USD)</label>
                    <input type="number" id="qqq_now" class="w-full border-2 border-gray-200 rounded-lg p-2 mt-1 mb-6 focus:border-blue-500 focus:outline-none transition-colors" oninput="calculate()">
                    
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-semibold text-gray-600">獲利導流比例 (<span id="ratio_val" class="text-blue-600 font-bold">25</span>%)</label>
                        <button onclick="applyDynamicStrategy()" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200 transition-colors">⚡ 套用階梯動態策略</button>
                    </div>
                    <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full mb-6 cursor-pointer" oninput="calculate()">

                    <label class="block text-sm font-semibold text-gray-600">QQQ 預期年報酬率 (<span id="return_val" class="text-blue-600 font-bold">11</span>%)</label>
                    <input type="range" id="expected_return" min="1" max="25" value="11" class="w-full mt-1 mb-6 cursor-pointer" oninput="calculate()">
                    
                    <label class="block text-sm font-semibold text-gray-600">預估年限 (<span id="years_val" class="text-blue-600 font-bold">5</span> 年)</label>
                    <input type="range" id="years" min="1" max="30" value="5" class="w-full mt-1 cursor-pointer" oninput="calculate()">
                </div>
            </div>

            <div class="md:w-1/2 mt-8 md:mt-0 bg-slate-100 p-6 rounded-xl border border-gray-200 shadow-inner">
                <h2 class="text-xl font-bold border-b border-gray-300 pb-2 mb-4 text-gray-800">📊 2. 決策分析結果</h2>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <div class="text-sm text-gray-500 font-medium">安全水位 (護城河)</div>
                        <div id="out_margin" class="text-2xl font-black text-blue-600">--</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                        <div class="text-sm text-gray-500 font-medium">帳面總純利潤 (TWD)</div>
                        <div id="out_profit" class="text-2xl font-black text-gray-800">--</div>
                    </div>
                </div>

                <div class="bg-red-50 p-3 rounded-lg border border-red-100 mb-4 flex justify-between items-center text-sm">
                    <span class="text-red-600 font-semibold">➖ 摩擦成本扣除 (交易稅/手續費/電匯)</span>
                    <span id="out_friction" class="font-bold text-red-700">--</span>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-500">
                        <div class="text-sm text-gray-500 font-medium">本季可導流淨額 (USD)</div>
                        <div id="out_transfer" class="text-2xl font-black text-green-600">--</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                        <div class="text-sm text-gray-500 font-medium">未來預估總資產 (USD)</div>
                        <div id="out_future" class="text-2xl font-black text-purple-600">--</div>
                    </div>
                </div>

                <div id="alert_box" class="p-4 rounded-lg font-bold mb-6 text-sm shadow-sm transition-all">
                    </div>

                <canvas id="growthChart" width="400" height="200" class="bg-white rounded-lg p-2 shadow-sm"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        // 格式化金錢顯示
        function formatMoney(num) {
            return '$' + parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        // 讀取/儲存 LocalStorage
        function loadSavedData() {
            const keys = ['cost_price', 'current_price', 'shares', 'fx_rate', 'qqq_now'];
            const defaults = { cost_price: 48, current_price: 77, shares: 1602, fx_rate: 31.4, qqq_now: 25660 };
            
            keys.forEach(key => {
                const saved = localStorage.getItem('wf_' + key);
                document.getElementById(key).value = saved !== null ? saved : defaults[key];
            });
        }

        function saveData() {
            const keys = ['cost_price', 'current_price', 'shares', 'fx_rate', 'qqq_now'];
            keys.forEach(key => {
                localStorage.setItem('wf_' + key, document.getElementById(key).value);
            });
        }

        // 自動抓取市場資料 (匯率 + 0050)
        async function fetchMarketData() {
            const btnText = document.getElementById('fetch_text');
            const btnIcon = document.getElementById('fetch_icon');
            btnText.innerText = "連線抓取中...";
            btnIcon.innerText = "⏳";
            
            try {
                // 1. 抓取匯率 (免費公開 API)
                const fxRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const fxData = await fxRes.json();
                if(fxData.rates && fxData.rates.TWD) {
                    document.getElementById('fx_rate').value = fxData.rates.TWD.toFixed(2);
                }

                // 2. 抓取 0050 市價 (透過 AllOrigins 代理避開 CORS 抓取 Yahoo Finance)
                const yfUrl = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW');
                const stockRes = await fetch(`https://api.allorigins.win/raw?url=${yfUrl}`);
                const stockData = await stockRes.json();
                const currentPrice = stockData.chart.result[0].meta.regularMarketPrice;
                if(currentPrice) {
                    document.getElementById('current_price').value = currentPrice;
                }

                calculate();
                btnIcon.innerText = "✅";
                btnText.innerText = "抓取成功！";
            } catch (e) {
                console.error(e);
                btnIcon.innerText = "❌";
                btnText.innerText = "抓取失敗，請手動輸入";
            }
            
            // 3秒後恢復按鈕原狀
            setTimeout(() => {
                btnIcon.innerText = "🔄";
                btnText.innerText = "抓取最新市價與匯率";
            }, 3000);
        }

        // 階梯式動態停利策略
        function applyDynamicStrategy() {
            const cost = parseFloat(document.getElementById('cost_price').value) || 0;
            const current = parseFloat(document.getElementById('current_price').value) || 0;
            const safetyMargin = current > 0 ? (current - cost) / current : 0;
            
            let recommendedRatio = 0;
            if (safetyMargin >= 0.3) { recommendedRatio = 40; }
            else if (safetyMargin >= 0.2) { recommendedRatio = 25; }
            else if (safetyMargin >= 0.1) { recommendedRatio = 15; }
            else { recommendedRatio = 0; }

            document.getElementById('transfer_ratio').value = recommendedRatio;
            calculate();
        }

        // 核心計算引擎
        function calculate() {
            saveData(); // 每次計算都順便存檔

            const cost = parseFloat(document.getElementById('cost_price').value) || 0;
            const current = parseFloat(document.getElementById('current_price').value) || 0;
            const shares = parseFloat(document.getElementById('shares').value) || 0;
            const fx = parseFloat(document.getElementById('fx_rate').value) || 1;
            const qqq = parseFloat(document.getElementById('qqq_now').value) || 0;
            
            const ratio = parseFloat(document.getElementById('transfer_ratio').value);
            const ret = parseFloat(document.getElementById('expected_return').value);
            const years = parseInt(document.getElementById('years').value);

            document.getElementById('ratio_val').innerText = ratio;
            document.getElementById('return_val').innerText = ret;
            document.getElementById('years_val').innerText = years;

            // 1. 基本利潤與護城河
            const totalProfit = (current - cost) * shares;
            const safetyMargin = current > 0 ? (current - cost) / current : 0;
            
            // 2. 摩擦成本計算 (證交稅 0.3%, 手續費 0.1425%, 電匯費 800)
            const extractedTwdBeforeFriction = totalProfit * (ratio / 100);
            let taxFee = 0, tradeFee = 0, wireFee = 0, totalFriction = 0, netTransferUsd = 0;

            if (extractedTwdBeforeFriction > 0) {
                taxFee = extractedTwdBeforeFriction * 0.003;
                tradeFee = extractedTwdBeforeFriction * 0.001425;
                wireFee = 800; // 固定電匯費
                totalFriction = taxFee + tradeFee + wireFee;
                
                let netTwd = extractedTwdBeforeFriction - totalFriction;
                if (netTwd < 0) netTwd = 0; // 避免利潤不夠扣手續費
                netTransferUsd = netTwd / fx;
            }

            // 3. 複利計算
            let principal = qqq;
            if (safetyMargin > 0.1) { // 只要護城河>10%就允許導流算入未來資產
                principal += netTransferUsd;
            }
            const futureValue = principal * Math.pow(1 + (ret / 100), years);

            // 4. 更新畫面文字
            document.getElementById('out_margin').innerText = (safetyMargin * 100).toFixed(2) + '%';
            document.getElementById('out_profit').innerText = formatMoney(totalProfit);
            document.getElementById('out_friction').innerText = "- " + formatMoney(totalFriction) + " TWD";
            document.getElementById('out_transfer').innerText = formatMoney(netTransferUsd);
            document.getElementById('out_future').innerText = formatMoney(futureValue);

            // 5. 狀態列與顏色判斷
            const alertBox = document.getElementById('alert_box');
            if (safetyMargin >= 0.2) {
                alertBox.className = "p-4 rounded-lg font-bold mb-6 text-sm bg-green-100 text-green-800 border-l-4 border-green-500";
                alertBox.innerHTML = "✅ 贏家信號：水位安全！已扣除真實摩擦成本，建議執行美金導流。";
            } else if (safetyMargin >= 0.1) {
                alertBox.className = "p-4 rounded-lg font-bold mb-6 text-sm bg-yellow-100 text-yellow-800 border-l-4 border-yellow-500";
                alertBox.innerHTML = "⚠️ 守備信號：護城河縮減。可評估降低導流比例，固守基本盤。";
            } else if (safetyMargin >= 0) {
                alertBox.className = "p-4 rounded-lg font-bold mb-6 text-sm bg-orange-100 text-orange-800 border-l-4 border-orange-500";
                alertBox.innerHTML = "🛑 停看聽信號：利潤微薄。扣除手續費與電匯後可能不划算，建議暫停導流。";
            } else {
                alertBox.className = "p-4 rounded-lg font-bold mb-6 text-sm bg-red-100 text-red-800 border-l-4 border-red-500";
                alertBox.innerHTML = "🚨 虧損信號：目前帳面呈現虧損。請重新評估 0050 投資策略！";
            }

            // 6. 重繪圖表
            updateChart(principal, ret, years);
        }

        // 繪製複利折線圖
        function updateChart(principal, ret, years) {
            const labels = [], data = [];
            for (let i = 0; i <= years; i++) {
                labels.push('第 ' + i + ' 年');
                data.push(principal * Math.pow(1 + (ret / 100), i));
            }

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '預估總資產 (USD)',
                        data: data,
                        borderColor: 'rgba(79, 70, 229, 1)', 
                        backgroundColor: 'rgba(79, 70, 229, 0.15)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: 'rgba(79, 70, 229, 1)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        // 網頁初始化
        window.onload = () => {
            loadSavedData();
            calculate();
        };
    </script>
</body>
</html>
