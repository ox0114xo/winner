<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow 戰情室</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.warn('圖表套件載入失敗')"></script>
    
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-hero { background: rgba(2, 6, 23, 0.8); border: 2px solid #334155; color: #fff; text-align: center; border-radius: 20px; padding: 16px; font-weight: 900; font-size: 1.5rem; width: 100%; outline: none; transition: all 0.3s ease; }
        .input-hero:focus { border-color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.25); }
        input[type=range] { -webkit-appearance: none; background: transparent; height: 50px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #10b981; margin-top: -11px; border: 4px solid #fff; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); cursor: pointer; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .text-glow { text-shadow: 0 0 20px currentColor; }
    </style>
</head>

<body class="min-h-screen p-3 md:p-8 flex flex-col items-center pb-12">

    <div id="debug_box" style="display:none; width:100%; background:red; color:white; padding:10px; font-size:12px; text-align:center; z-index:9999; border-radius:10px; margin-bottom:10px;"></div>

    <div class="w-full max-w-6xl space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 px-2 mb-4">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <img src="icon.png" class="w-16 h-16 rounded-[1.25rem] shadow-2xl border border-white/20" onerror="this.style.display='none'">
                <div class="flex-grow">
                    <h1 class="text-2xl font-black italic tracking-tighter text-white">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="relative flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                        <p id="sync_status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">系統已啟動</p>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <button onclick="fetchMarketData()" class="flex-grow md:flex-grow-0 bg-indigo-600/90 hover:bg-indigo-500 text-white px-6 py-4 rounded-2xl font-black text-sm tracking-widest active:scale-95 transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                    <i id="f-icon" class="fa-solid fa-satellite-dish mr-2"></i> <span id="f-text">同步全球數據</span>
                </button>
            </div>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-[45%] space-y-6">
                <div class="glass rounded-[2.5rem] p-6 md:p-8 space-y-8">
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">0050 均價</label>
                            <input type="number" id="cost_price" value="48" class="input-hero" oninput="safeCalculate()">
                        </div>
                        <div class="space-y-2 relative">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">0050 市價</label>
                            <input type="number" id="current_price" value="77" class="input-hero text-emerald-400 text-glow" oninput="safeCalculate()">
                            <span id="roi_badge" class="absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-black px-3 py-1 rounded-full border border-slate-700 bg-slate-900 shadow-2xl z-10">--%</span>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">持有股數</label>
                            <input type="number" id="shares" value="1602" class="input-hero" oninput="safeCalculate()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">即時匯率</label>
                            <input type="number" id="fx_rate" value="31.4" step="0.1" class="input-hero text-indigo-400" oninput="safeCalculate()">
                        </div>
                    </div>

                    <div class="bg-indigo-900/20 p-6 rounded-[2rem] border border-indigo-500/20">
                        <label class="text-xs font-black text-indigo-300 block mb-2 text-center uppercase tracking-widest">QQQ 美金戰略儲備</label>
                        <input type="number" id="qqq_now" value="25660" class="w-full bg-transparent border-none text-white text-4xl font-black text-center focus:ring-0 outline-none" oninput="safeCalculate()">
                    </div>

                    <div class="space-y-6 bg-slate-900/40 p-6 rounded-[2rem] border border-white/5" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-xs font-black text-slate-300 mb-2 uppercase">
                                <span>導流火力</span> <span class="text-emerald-400 text-xl text-glow"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); safeCalculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-6 pt-2">
                            <div><label class="text-[10px] font-black text-slate-500 block uppercase">年化期望 (<span id="ret_val" class="text-indigo-400">11</span>%)</label><input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); safeCalculate()"></div>
                            <div><label class="text-[10px] font-black text-slate-500 block uppercase">作戰年限 (<span id="yrs_val" class="text-emerald-400">5</span>年)</label><input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); safeCalculate()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-[55%] space-y-6" ontouchstart="hideKeyboard()">
                <div class="glass rounded-[2.5rem] p-6 md:p-8 space-y-6 h-full flex flex-col">
                    
                    <div>
                        <div class="flex justify-between items-end mb-3">
                            <div>
                                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">價格護城河</span>
                                <div id="out_margin_text" class="text-5xl font-black text-white mt-1">--</div>
                            </div>
                            <div id="alert_box" class="text-[10px] font-black px-4 py-2 rounded-xl bg-slate-900 border border-slate-700 text-slate-400 uppercase tracking-widest">運算中</div>
                        </div>
                        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden mb-4">
                            <div id="margin_bar" class="h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                        
                        <div id="ai_briefing" class="bg-slate-800/50 rounded-2xl p-4 text-sm font-medium text-slate-300">
                            正在載入戰略分析...
                        </div>
                    </div>

                    <div class="flex-grow min-h-[200px] relative mt-2 bg-slate-900/30 rounded-[2rem] p-4 border border-white/5">
                        <div class="absolute top-6 left-6 z-10">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">執行策略將為您多創造</span>
                            <span id="extra_wealth" class="text-2xl font-black text-emerald-400 text-glow">--</span>
                        </div>
                        <canvas id="growthChart"></canvas>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        var myChart = null;

        // 【極致防禦】捕捉所有網頁錯誤，顯示在畫面上，避免死得不明不白
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var dbg = document.getElementById('debug_box');
            if(dbg) {
                dbg.style.display = 'block';
                dbg.innerHTML = "系統發生錯誤: " + msg + " (請截圖給開發者)";
            }
            return false;
        };

        // 數字格式化安全版
        function fmt(n, p) { 
            if (isNaN(n)) return (p || '') + '0';
            return (p || '') + parseFloat(n).toLocaleString('en-US', {maximumFractionDigits: 0}); 
        }

        function hideKeyboard() { 
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur(); 
            }
        }
        function uiInteract() { 
            hideKeyboard(); 
            if (navigator.vibrate) {
                try { navigator.vibrate(10); } catch(e){}
            } 
        }

        // 核心計算安全包裝 (如果壞掉不會影響其他按鈕)
        function safeCalculate() {
            try {
                calculateCore();
            } catch(e) {
                console.error("計算過程發生錯誤:", e);
                var ai = document.getElementById('ai_briefing');
                if(ai) ai.innerHTML = "⚠️ 計算模組發生異常，請重整網頁。";
            }
        }

        // 真實計算邏輯
        function calculateCore() {
            var c_input = document.getElementById('cost_price');
            var cur_input = document.getElementById('current_price');
            var s_input = document.getElementById('shares');
            var fx_input = document.getElementById('fx_rate');
            var q_input = document.getElementById('qqq_now');
            
            // 確保元素存在再取值
            if (!c_input || !cur_input || !s_input) return;

            var c = parseFloat(c_input.value) || 0;
            var cur = parseFloat(cur_input.value) || 0;
            var s = parseFloat(s_input.value) || 0;
            var fx = parseFloat(fx_input.value) || 1;
            var q = parseFloat(q_input.value) || 0;
            var r = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            var re = parseFloat(document.getElementById('expected_return').value) || 0;
            var y = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = r;
            document.getElementById('ret_val').innerText = re;
            document.getElementById('yrs_val').innerText = y;

            // 儲存資料
            try { localStorage.setItem('winner_v11', JSON.stringify({c:c, cur:cur, s:s, fx:fx, q:q})); } catch(e) {}

            var profit = (cur - c) * s;
            var margin = cur > 0 ? (cur - c) / cur : 0;
            var roi = c > 0 ? ((cur - c) / c) * 100 : 0;
            
            var extractTwd = profit * (r / 100);
            var friction = extractTwd > 0 ? (extractTwd * 0.004425 + 850) : 0;
            var netUsd = Math.max(0, extractTwd - friction) / fx;
            
            var willDivert = margin >= 0.1;
            var futureWithStrategy = (q + (willDivert ? netUsd : 0)) * Math.pow(1 + (re / 100), y);
            var futureWithoutStrategy = q * Math.pow(1 + (re / 100), y);
            var extraWealth = futureWithStrategy - futureWithoutStrategy;

            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(1) + '%';
            document.getElementById('extra_wealth').innerText = fmt(extraWealth, '+$');

            var roiB = document.getElementById('roi_badge');
            if(roiB) {
                roiB.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
                roiB.className = "absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-black px-3 py-1 rounded-full border border-slate-700 bg-slate-900 shadow-2xl z-10 " + (roi >= 0 ? 'text-emerald-400' : 'text-rose-400');
            }

            var mb = document.getElementById('margin_bar');
            var ab = document.getElementById('alert_box');
            var ai = document.getElementById('ai_briefing');
            
            if(mb) mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            
            if (margin >= 0.2) { 
                if(mb) mb.className = "h-full bg-emerald-400"; 
                if(ab) { ab.innerText = "水位極佳"; ab.className = "text-[10px] font-black px-4 py-2 rounded-xl bg-emerald-500/20 text-emerald-400"; }
                if(ai) ai.innerHTML = '🛡️ <b>AI 戰略官：</b> 護城河深厚。建議套現 <b>' + fmt(extractTwd, 'NT$') + '</b> 利潤，注入 <b>' + fmt(netUsd, '$') + '</b> 擴大美股資產。';
            } else if (margin >= 0.1) { 
                if(mb) mb.className = "h-full bg-amber-400"; 
                if(ab) { ab.innerText = "警戒狀態"; ab.className = "text-[10px] font-black px-4 py-2 rounded-xl bg-amber-500/20 text-amber-400"; }
                if(ai) ai.innerHTML = '⚠️ <b>AI 戰略官：</b> 護城河縮水。建議調降比例，保守注入 <b>' + fmt(netUsd, '$') + '</b>。';
            } else { 
                if(mb) mb.className = "h-full bg-rose-500"; 
                if(ab) { ab.innerText = "封鎖導流"; ab.className = "text-[10px] font-black px-4 py-2 rounded-xl bg-rose-500/20 text-rose-400"; }
                if(ai) ai.innerHTML = '🛑 <b>AI 戰略官：</b> 摩擦成本過高，<b>通道已封鎖</b>，請按兵不動。';
            }

            // 安全繪製圖表 (即使 Chart.js 沒載入也不會當機)
            try {
                if (typeof Chart !== 'undefined') {
                    var lbls = [], dtaWith = [], dtaWithout = [];
                    for (var i = 0; i <= y; i++) { 
                        lbls.push("Y" + i); 
                        dtaWith.push((q + (willDivert ? netUsd : 0)) * Math.pow(1 + (re / 100), i)); 
                        dtaWithout.push(q * Math.pow(1 + (re / 100), i));
                    }
                    if (myChart) myChart.destroy();
                    var ctx = document.getElementById('growthChart');
                    if(ctx) {
                        var ctx2d = ctx.getContext('2d');
                        var gradWith = ctx2d.createLinearGradient(0,0,0,250); 
                        gradWith.addColorStop(0, 'rgba(16, 185, 129, 0.5)'); 
                        gradWith.addColorStop(1, 'transparent');
                        
                        myChart = new Chart(ctx2d, { 
                            type: 'line', 
                            data: { 
                                labels: lbls, 
                                datasets: [
                                    { label: '執行戰略', data: dtaWith, borderColor: '#10b981', backgroundColor: gradWith, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 },
                                    { label: '維持現狀', data: dtaWithout, borderColor: '#6366f1', borderDash: [5, 5], backgroundColor: 'transparent', fill: false, tension: 0.4, borderWidth: 2, pointRadius: 0 }
                                ] 
                            }, 
                            options: { 
                                responsive: true, maintainAspectRatio: false, layout: { padding: { top: 40 } }, 
                                plugins: { legend: { display: false } }, 
                                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: {size: 10} } } } 
                            } 
                        });
                    }
                }
            } catch(chartErr) {
                console.warn("圖表繪製跳過: ", chartErr);
            }
        }

        // 同步按鈕邏輯
        async function fetchMarketData() {
            uiInteract();
            var bT = document.getElementById('f-text');
            var bI = document.getElementById('f-icon');
            var statusStr = document.getElementById('sync_status');
            
            if(bT) bT.innerText = "連線中..."; 
            if(bI) bI.className = "fa-solid fa-satellite-dish fa-spin";
            
            let fx = null, stk = null;
            
            // 使用最簡單安全的 fetch
            try { 
                const res1 = await fetch('https://api.exchangerate-api.com/v4/latest/USD'); 
                const data1 = await res1.json(); 
                if(data1 && data1.rates) fx = data1.rates.TWD; 
            } catch(e){ console.log("匯率失敗"); }
            
            try { 
                const u = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW');
                const res2 = await fetch(`https://api.allorigins.win/raw?url=${u}`); 
                const data2 = await res2.json(); 
                if(data2 && data2.chart) stk = data2.chart.result[0].meta.regularMarketPrice;
            } catch(e){ console.log("股價失敗"); }

            if (fx && document.getElementById('fx_rate')) document.getElementById('fx_rate').value = fx.toFixed(2);
            if (stk && document.getElementById('current_price')) document.getElementById('current_price').value = stk;
            
            if (fx || stk) {
                safeCalculate();
                if(bI) bI.className = "fa-solid fa-check text-emerald-400"; 
                if(bT) bT.innerText = "同步完成";
                var n = new Date(); 
                if(statusStr) statusStr.innerText = "更新於 " + n.getHours() + ":" + n.getMinutes().toString().padStart(2,'0');
            } else {
                if(bI) bI.className = "fa-solid fa-xmark text-rose-500"; 
                if(bT) bT.innerText = "連線失敗";
            }
            setTimeout(function() { 
                if(bI) bI.className = "fa-solid fa-rotate-right"; 
                if(bT) bT.innerText = "同步全球數據"; 
            }, 3000);
        }

        // 系統啟動
        function initApp() {
            var c_val = 48, cur_val = 77, s_val = 1602, fx_val = 31.4, q_val = 25660;
            try {
                var saved = localStorage.getItem('winner_v11');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    if(parsed) {
                        c_val = parsed.c || 48; cur_val = parsed.cur || 77;
                        s_val = parsed.s || 1602; fx_val = parsed.fx || 31.4; q_val = parsed.q || 25660;
                    }
                }
            } catch(e) { console.log("讀取存檔失敗"); }
            
            if(document.getElementById('cost_price')) document.getElementById('cost_price').value = c_val; 
            if(document.getElementById('current_price')) document.getElementById('current_price').value = cur_val;
            if(document.getElementById('sh
