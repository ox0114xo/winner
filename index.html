<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow | 贏家極光版</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WinnerFlow">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ox0114xo/winner/refs/heads/main/1000084947_imgupscaler.ai_%E9%8A%BD%E5%8C%96_2K.png">
    <link rel="icon" href="https://raw.githubusercontent.com/ox0114xo/winner/refs/heads/main/1000084947_imgupscaler.ai_%E9%8A%BD%E5%8C%96_2K.png">
    <meta name="theme-color" content="#0B0F19">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: #f8fafc; outline: none; }
        .input-dark:focus { border-color: #10b981; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .neon-text { text-shadow: 0 0 15px currentColor; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: #334155; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #10b981; margin-top: -7px; box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        /* 安裝提示欄樣式 */
        #install-banner { display: none; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>

<body class="font-sans min-h-screen flex flex-col items-center">

    <div id="install-banner" class="w-full bg-gradient-to-r from-indigo-600 to-emerald-600 p-3 text-white sticky top-0 z-[100] shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/ox0114xo/winner/refs/heads/main/1000084947_imgupscaler.ai_%E9%8A%BD%E5%8C%96_2K.png" class="w-10 h-10 rounded-lg shadow-md border border-white/20">
                <div>
                    <p class="text-sm font-black">WinnerFlow</p>
                    <p class="text-[10px] opacity-80">將贏家系統安裝至桌面</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="dismissInstall()" class="text-xs px-3 py-1.5 opacity-70">稍後</button>
                <button id="install-btn" class="bg-white text-indigo-900 text-xs font-bold px-4 py-1.5 rounded-full shadow-md">立即安裝</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-6xl glass-panel rounded-3xl shadow-2xl overflow-hidden relative m-4 md:m-8">
        <div class="p-6 md:p-8 flex flex-col md:flex-row justify-between items-center border-b border-slate-800 relative z-10">
            <div class="flex items-center gap-4">
                <img src="https://raw.githubusercontent.com/ox0114xo/winner/refs/heads/main/1000084947_imgupscaler.ai_%E9%8A%BD%E5%8C%96_2K.png" class="w-12 h-12 rounded-xl border border-emerald-500/30 shadow-lg shadow-emerald-500/10">
                <div>
                    <h1 class="text-2xl font-black tracking-wider text-white">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-tighter">Professional Asset Diverter</p>
                </div>
            </div>
            <button onclick="fetchMarketData()" class="mt-5 md:mt-0 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-emerald-400 py-2 px-5 rounded-full font-bold transition-all flex items-center gap-2 active:scale-95 shadow-lg">
                <i id="fetch_icon" class="fa-solid fa-satellite-dish"></i>
                <span id="fetch_text">同步官方數據</span>
            </button>
        </div>

        <div class="p-5 md:p-8 md:flex gap-8 lg:gap-12 relative z-10">
            <div class="md:w-[45%] space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">買進均價</label>
                        <input type="number" id="cost_price" class="w-full input-dark rounded-xl p-3 font-black text-xl text-center" oninput="calculate()">
                    </div>
                    <div class="space-y-1 relative">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">目前市價</label>
                        <input type="number" id="current_price" class="w-full input-dark rounded-xl p-3 font-black text-xl text-emerald-400 text-center neon-text" oninput="calculate()">
                        <span id="roi_badge" class="absolute bottom-3 right-3 text-[10px] font-black px-1.5 py-0.5 rounded bg-slate-800 border border-slate-700">--%</span>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">持有股數</label>
                        <input type="number" id="shares" class="w-full input-dark rounded-xl p-3 font-black text-xl text-center" oninput="calculate()">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">即時匯率</label>
                        <input type="number" id="fx_rate" step="0.1" class="w-full input-dark rounded-xl p-3 font-black text-xl text-indigo-400 text-center" oninput="calculate()">
                    </div>
                </div>
                
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block mb-2">QQQ 目前美金水位</label>
                    <input type="number" id="qqq_now" class="w-full bg-slate-900 border border-indigo-900 rounded-lg p-3 font-black text-2xl text-white text-center outline-none" oninput="calculate()">
                </div>

                <div class="bg-slate-800/30 p-5 rounded-2xl border border-slate-700/50 space-y-6" ontouchstart="hideKeyboard()">
                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-sm font-bold text-slate-300">導流比例: <span id="ratio_val" class="text-emerald-400 text-lg">25</span>%</label>
                            <button onclick="autoStrategy()" class="text-[10px] bg-slate-800 text-slate-300 border border-slate-600 px-3 py-1.5 rounded-full font-bold">自動判定</button>
                        </div>
                        <input type="range" id="transfer_ratio" min="0" max="100" value="25" oninput="uiInteract(); calculate()">
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-700/50">
                        <div>
                            <label class="text-xs font-bold text-slate-400 mb-2 block">預期報酬 (<span id="return_val">11</span>%)</label>
                            <input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 mb-2 block">預估年限 (<span id="years_val">5</span>年)</label>
                            <input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:w-[55%] flex flex-col space-y-5" ontouchstart="hideKeyboard()">
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-end mb-3">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">護城河深度</span>
                        <span id="out_margin_text" class="text-2xl font-black text-white">--</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2 mb-4 overflow-hidden">
                        <div id="margin_bar" class="h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_10px_currentColor]" style="width: 0%;"></div>
                    </div>
                    <div id="alert_box" class="bg-slate-900/50 rounded-xl p-3 text-sm font-medium flex gap-3 items-start border border-slate-700/50 text-slate-300">
                        系統初始化中...
                    </div>
                </div>

                <div class="bg-indigo-900/20 p-6 rounded-2xl border border-indigo-500/30 flex flex-col justify-center items-center text-center">
                    <div class="text-[10px] font-bold text-indigo-400 mb-2 tracking-widest uppercase italic">Projected Future Wealth</div>
                    <div id="out_future" class="text-4xl md:text-5xl font-black text-white tracking-tight drop-shadow-md">--</div>
                    <div id="milestone_text" class="mt-4 text-xs font-medium text-indigo-200 bg-indigo-900/60 px-4 py-2 rounded-full border border-indigo-700/50">
                        分析中...
                    </div>
                </div>

                <div class="flex-grow bg-slate-800/30 rounded-2xl p-4 border border-slate-700 relative min-h-[180px]">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null, deferredPrompt;

        // --- PWA 安裝邏輯 (Android) ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') dismissInstall();
                deferredPrompt = null;
            } else {
                // iOS 專屬提示
                alert('iOS 使用者請點擊瀏覽器底部的「分享」按鈕，然後選擇「加入主畫面」');
            }
        });

        function dismissInstall() { document.getElementById('install-banner').style.display = 'none'; }

        // --- 核心運算與原本邏輯 ---
        function fmtMny(num, pre = '') { return pre + parseFloat(num).toLocaleString('en-US', { maximumFractionDigits: 0 }); }
        function hideKeyboard() { if (document.activeElement && document.activeElement.tagName === 'INPUT') document.activeElement.blur(); }
        function uiInteract() { hideKeyboard(); if (navigator.vibrate) navigator.vibrate(10); }

        async function fetchMarketData() {
            uiInteract();
            const btnT = document.getElementById('fetch_text'), btnI = document.getElementById('fetch_icon');
            btnT.innerText = "連線中..."; btnI.className = "fa-solid fa-circle-notch fa-spin";
            let fxOk = false, stkOk = false;

            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json();
                if (d?.rates?.TWD) { document.getElementById('fx_rate').value = d.rates.TWD.toFixed(2); fxOk = true; }
            } catch (e) {}

            try {
                const r = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                const d = await r.json();
                const s = d.find(x => x.Code === "0050");
                if (s?.ClosingPrice) { document.getElementById('current_price').value = parseFloat(s.ClosingPrice); stkOk = true; }
            } catch (e) {}

            calculate();
            btnI.className = fxOk && stkOk ? "fa-solid fa-check text-emerald-400" : "fa-solid fa-xmark text-rose-400";
            btnT.innerText = fxOk && stkOk ? "已同步" : "連線失敗";
            setTimeout(() => { btnI.className = "fa-solid fa-satellite-dish"; btnT.innerText = "同步官方數據"; }, 3000);
        }

        function autoStrategy() {
            uiInteract();
            const mgn = (parseFloat(document.getElementById('current_price').value) - parseFloat(document.getElementById('cost_price').value)) / parseFloat(document.getElementById('current_price').value);
            let rec = 0;
            if (mgn >= 0.3) rec = 40; else if (mgn >= 0.2) rec = 25; else if (mgn >= 0.1) rec = 15;
            document.getElementById('transfer_ratio').value = rec;
            calculate();
        }

        function calculate() {
            const cst = parseFloat(document.getElementById('cost_price').value) || 0;
            const cur = parseFloat(document.getElementById('current_price').value) || 0;
            const shr = parseFloat(document.getElementById('shares').value) || 0;
            const fx  = parseFloat(document.getElementById('fx_rate').value) || 1;
            const qqq = parseFloat(document.getElementById('qqq_now').value) || 0;
            const rat = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const ret = parseFloat(document.getElementById('expected_return').value) || 0;
            const yrs = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = rat;
            document.getElementById('return_val').innerText = ret;
            document.getElementById('years_val').innerText = yrs;

            localStorage.setItem('wf_data', JSON.stringify({cst, cur, shr, fx, qqq}));

            const pft = (cur - cst) * shr;
            const mgn = cur > 0 ? (cur - cst) / cur : 0;
            const roi = cst > 0 ? ((cur - cst) / cst) * 100 : 0; 
            const netUsd = Math.max(0, (pft * (rat / 100)) - (pft * (rat / 100) * 0.004425 + 800)) / fx;
            const principal = qqq + (mgn > 0.1 ? netUsd : 0);
            const ftr = principal * Math.pow(1 + (ret / 100), yrs);

            // 畫面渲染
            const roiB = document.getElementById('roi_badge');
            roiB.innerText = (roi > 0 ? '+' : '') + roi.toFixed(1) + '%';
            roiB.className = `absolute bottom-3 right-3 text-[10px] font-black px-1.5 py-0.5 rounded border ${roi >= 0 ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-rose-900/30 text-rose-400 border-rose-800'}`;

            document.getElementById('out_profit').innerText = fmtMny(pft, 'NT$ ');
            document.getElementById('out_transfer').innerText = fmtMny(netUsd, '$ ');
            document.getElementById('out_future').innerText = fmtMny(ftr, '$ ');

            const mT = document.getElementById('out_margin_text'), mB = document.getElementById('margin_bar'), ab = document.getElementById('alert_box');
            mT.innerText = (mgn * 100).toFixed(2) + '%';
            mB.style.width = Math.max(0, Math.min(mgn * 200, 100)) + '%';
            
            if (mgn >= 0.2) { 
                mB.className="h-full rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981]"; 
                ab.innerHTML="<i class='fa-solid fa-robot text-emerald-400'></i> <span>水位安全，導流通道已開啟。</span>"; 
            } else if (mgn >= 0.1) {
                mB.className="h-full rounded-full bg-amber-500 shadow-[0_0_15px_#f59e0b]";
                ab.innerHTML="<i class='fa-solid fa-robot text-amber-400'></i> <span>護城河縮減，建議小額導流。</span>";
            } else {
                mB.className="h-full rounded-full bg-rose-500 shadow-[0_0_15px_#f43f5e]";
                ab.innerHTML="<i class='fa-solid fa-robot text-rose-400'></i> <span>獲利過低，建議關閉導流。</span>";
            }

            // 里程碑推算
            let mile = `${yrs} 年後將達到預估目標。`;
            const tgts = [100000, 500000, 1000000];
            for (let i = 1; i <= yrs; i++) {
                let v = principal * Math.pow(1 + (ret / 100), i);
                let hit = tgts.find(t => v >= t && (principal * Math.pow(1 + (ret / 100), i-1)) < t);
                if (hit) { mile = `🚀 預計在第 ${i} 年突破 $${hit/10000} 萬美金大關！`; break; }
            }
            document.getElementById('milestone_text').innerHTML = mile;

            // 更新圖表
            const lbls = [], dta = [];
            for (let i = 0; i <= yrs; i++) { lbls.push(`Y${i}`); dta.push(principal * Math.pow(1 + (ret / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,200); 
            grad.addColorStop(0, 'rgba(129, 140, 248, 0.3)'); grad.addColorStop(1, 'rgba(129, 140, 248, 0)');
            myChart = new Chart(ctx, { 
                type: 'line', 
                data: { labels: lbls, datasets: [{ data: dta, borderColor: '#818cf8', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2 }] }, 
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } } } 
            });
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('wf_data')) || {cst: 48, cur: 77, shr: 1602, fx: 31.4, qqq: 25660};
            document.getElementById('cost_price').value = s.cst;
            document.getElementById('current_price').value = s.cur;
            document.getElementById('shares').value = s.shr;
            document.getElementById('fx_rate').value = s.fx;
            document.getElementById('qqq_now').value = s.qqq;
            calculate();
        };
    </script>
</body>
</html>
