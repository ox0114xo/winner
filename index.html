<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinnerFlow 3.0</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
  font-family:system-ui;
}

.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:1.5rem;
  padding:1.5rem;
}

.big-number{
  font-size:2.5rem;
  font-weight:900;
}

.nav-btn{
  padding:8px 16px;
  border-radius:999px;
  background:#1e293b;
}

.nav-btn.active{
  background:#10b981;
  color:black;
}

</style>
</head>

<body class="p-4 max-w-6xl mx-auto space-y-6">

<!-- NAV -->
<div class="flex gap-2 text-sm font-bold">
<button onclick="switchTab('home')" class="nav-btn active">首頁</button>
<button onclick="switchTab('control')" class="nav-btn">資產控制</button>
<button onclick="switchTab('record')" class="nav-btn">成就系統</button>
</div>

<!-- HOME -->
<div id="tab-home" class="space-y-6">

<!-- 資產儀表 -->
<div class="glass text-center">
<canvas id="goalChart" height="160"></canvas>
<div class="big-number mt-2" id="assetDisplay">--</div>
<div id="todayDisplay" class="text-emerald-400 font-bold">--</div>
</div>

<!-- 壓力雷達 -->
<div class="glass">
<canvas id="stressRadar"></canvas>
</div>

<!-- 成長曲線 -->
<div class="glass">
<canvas id="growthChart"></canvas>
</div>

<!-- AI 建議 -->
<div class="glass">
<div class="text-sm text-slate-400">AI 戰略建議</div>
<div id="aiAdvice" class="text-xl font-black mt-2 text-emerald-400"></div>
<div class="mt-2 text-sm">風險等級：<span id="riskLevel"></span></div>
</div>

</div>

<!-- CONTROL -->
<div id="tab-control" class="hidden space-y-6">

<div class="glass space-y-4">
<div class="grid grid-cols-2 gap-4">
<input id="assetInput" type="number" placeholder="目前資產" class="p-2 bg-slate-800 rounded">
<input id="goalInput" type="number" placeholder="目標資產" class="p-2 bg-slate-800 rounded">
<input id="returnInput" type="number" placeholder="年化報酬 %" class="p-2 bg-slate-800 rounded">
<input id="yearInput" type="number" placeholder="投資年限" class="p-2 bg-slate-800 rounded">
</div>
<button onclick="calculate()" class="w-full bg-emerald-500 text-black py-2 rounded-xl font-bold">更新系統</button>
</div>

</div>

<!-- RECORD -->
<div id="tab-record" class="hidden">
<div class="glass">
<div class="text-lg font-bold mb-3">等級系統</div>
<div id="levelDisplay"></div>
<ul id="achievements" class="mt-4 space-y-2 text-sm"></ul>
</div>
</div>

<script>
let goalChart, stressRadar, growthChart;

function switchTab(tab){
document.querySelectorAll("[id^='tab-']").forEach(t=>t.classList.add("hidden"));
document.getElementById("tab-"+tab).classList.remove("hidden");
document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

function animateNumber(id,value){
let el=document.getElementById(id);
let start=0;
let duration=1000;
let startTime=null;
function step(timestamp){
if(!startTime) startTime=timestamp;
let progress=Math.min((timestamp-startTime)/duration,1);
el.textContent=Math.floor(progress*(value-start)+start).toLocaleString();
if(progress<1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function calculate(){
let asset=parseFloat(assetInput.value)||0;
let goal=parseFloat(goalInput.value)||1;
let rate=(parseFloat(returnInput.value)||5)/100;
let years=parseInt(yearInput.value)||5;

localStorage.setItem("wf3",JSON.stringify({asset,goal,rate,years}));

let percent=Math.min(100,(asset/goal)*100);

animateNumber("assetDisplay",asset);
todayDisplay.textContent="目標達成 "+percent.toFixed(1)+"%";

renderGoal(percent);
renderRadar(asset,goal,years);
renderGrowth(asset,rate,years);
generateAI(asset,goal,years);
updateLevel(asset);
}

function renderGoal(percent){
if(goalChart) goalChart.destroy();
goalChart=new Chart(goalChartCanvas,{
type:"doughnut",
data:{datasets:[{data:[percent,100-percent],backgroundColor:["#10b981","#1e293b"],borderWidth:0}]},
options:{cutout:"75%",plugins:{legend:{display:false}}}
});
}

function renderRadar(asset,goal,years){
if(stressRadar) stressRadar.destroy();
let concentration=Math.min(100,(asset/goal)*80);
let timePressure=years*10;
stressRadar=new Chart(stressRadarCanvas,{
type:"radar",
data:{
labels:["集中度","時間壓力","波動風險","現金比例","心理壓力"],
datasets:[{
data:[concentration,timePressure,60,40,50],
borderColor:"#10b981",
backgroundColor:"rgba(16,185,129,0.2)"
}]
},
options:{plugins:{legend:{display:false}},scales:{r:{grid:{color:"#334155"}}}}
});
}

function renderGrowth(asset,rate,years){
if(growthChart) growthChart.destroy();
let labels=[],data=[];
for(let i=0;i<=years;i++){
labels.push("Y"+i);
data.push(asset*Math.pow(1+rate,i));
}
growthChart=new Chart(growthChartCanvas,{
type:"line",
data:{labels:labels,datasets:[{data:data,borderColor:"#10b981",tension:0.3}]},
options:{plugins:{legend:{display:false}},scales:{y:{display:false}}}
});
}

function generateAI(asset,goal,years){
let ratio=asset/goal;
let advice="";
let risk="";
if(ratio<0.3){ advice="積極成長期，增加導流"; risk="低"; }
else if(ratio<0.7){ advice="穩定推進，控制風險"; risk="中"; }
else{ advice="接近目標，降低波動"; risk="高"; }
aiAdvice.textContent=advice;
riskLevel.textContent=risk;
}

function updateLevel(asset){
let level=Math.floor(asset/1000000)+1;
levelDisplay.textContent="Lv."+level;
let list=[];
if(asset>1000000) list.push("🥇 百萬達成");
if(asset>5000000) list.push("🏆 五百萬達成");
if(asset>10000000) list.push("👑 千萬自由");
achievements.innerHTML=list.map(i=>"<li>"+i+"</li>").join("");
}

window.onload=()=>{
let saved=JSON.parse(localStorage.getItem("wf3"));
if(saved){
assetInput.value=saved.asset;
goalInput.value=saved.goal;
returnInput.value=saved.rate*100;
yearInput.value=saved.years;
calculate();
}
};
</script>

</body>
</html>
