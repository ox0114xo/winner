<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow | 旗艦明亮版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* 提升背景明亮感與層次 */
        body { background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); color: #f8fafc; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        /* 加大輸入框與加強顏色 */
        .input-box { background: #0f172a; border: 2px solid #334155; color: #fff; text-align: center; border-radius: 16px; outline: none; width: 100%; padding: 14px; font-weight: 800; font-size: 1.25rem; transition: all 0.2s; }
        .input-box:focus { border-color: #10b981; background: #1e293b; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        
        /* 加大滑桿 */
        input[type=range] { -webkit-appearance: none; background: transparent; height: 40px; }
        input[type=range]::-webkit-slider-runnable-track { background: #334155; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: #10b981; margin-top: -9px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); border: 3px solid #fff; }
        
        .neon-green { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.4); }
        .neon-indigo { color: #818cf8; text-shadow: 0 0 10px rgba(129, 140, 248, 0.4); }
        
        #install-banner { display: none; transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        #install-banner.show { display: block; transform: translateY(0); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center pb-12">

    <div id="install-banner" class="w-full fixed top-0 z-[100] p-4">
        <div class="max-w-xl mx-auto bg-indigo-600 rounded-2xl shadow-2xl p-5 flex justify-between items-center text-white border-2 border-white/20">
            <div class="flex items-center gap-4">
                <img src="icon.png" class="w-14 h-14 rounded-xl shadow-lg">
                <div>
                    <p class="font-black text-lg leading-tight">安裝 WinnerFlow</p>
                    <p class="text-xs opacity-90 mt-1" id="install-txt">將贏家決策系統加入桌面</p>
                </div>
            </div>
            <button id="install-btn" class="bg-white text-indigo-700 px-6 py-2.5 rounded-xl font-black text-sm shadow-xl active:scale-95 transition-all">立即安裝</button>
            <button onclick="dismissInstall()" class="absolute -top-2 -right-2 bg-slate-800 rounded-full w-7 h-7 text-xs flex items-center justify-center border border-white/20">✕</button>
        </div>
    </div>

    <div class="w-full max-w-5xl px-4 py-8 md:py-12 space-y-8">
        
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl bg-white/5 p-1 border border-white/10 shadow-2xl shadow-emerald-500/10">
                    <img src="icon.png" class="w-full h-full rounded-[14px]">
                </div>
                <div>
                    <h1 class="text-3xl font-black text-white italic tracking-tighter">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <p id="sync_status" class="text-[11px] text-slate-400 font-black tracking-widest uppercase mt-0.5">系統待命中</p>
                </div>
            </div>
            <button onclick="fetchMarketData()" class="bg-indigo-600 text-white px-7 py-3.5 rounded-2xl font-black text-xs tracking-widest hover:bg-indigo-500 transition-all flex items-center gap-2 active:scale-90 shadow-lg shadow-indigo-600/20">
                <i id="f-icon" class="fa-solid fa-rotate"></i> <span>SYNC</span>
            </button>
        </div>

        <div class="lg:flex gap-8 space-y-8 lg:space-y-0">
            <div class="lg:w-5/12 space-y-6">
                <div class="glass-card rounded-[2.5rem] p-8 space-y-8 border-t border-white/10">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[12px] font-black text-slate-300 block text-center uppercase tracking-wider">買進均價</label>
                            <input type="number" id="cost_price" class="input-box" oninput="calculate()">
                        </div>
                        <div class="space-y-2 relative">
                            <label class="text-[12px] font-black text-slate-300 block text-center uppercase tracking-wider">目前市價</label>
                            <input type="number" id="current_price" class="input-box neon-green" oninput="calculate()">
                            <span id="roi_badge" class="absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-black px-3 py-1 rounded-full border border-white/10 bg-slate-800 shadow-2xl">--%</span>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[12px] font-black text-slate-300 block text-center uppercase tracking-wider">持有股數</label>
                            <input type="number" id="shares" class="input-box" oninput="calculate()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[12px] font-black text-slate-300 block text-center uppercase tracking-wider">即時匯率</label>
                            <input type="number" id="fx_rate" class="input-box neon-indigo" oninput="calculate()">
                        </div>
                    </div>

                    <div class="bg-indigo-500/10 p-6 rounded-3xl border border-indigo-500/20 shadow-inner">
                        <label class="text-[11px] font-black text-indigo-300 tracking-widest uppercase block mb-2 text-center">QQQ 目前資產 (USD)</label>
                        <input type="number" id="qqq_now" class="w-full bg-transparent border-none text-white text-4xl font-black text-center focus:ring-0" oninput="calculate()">
                    </div>

                    <div class="space-y-8" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-[12px] font-black text-slate-300 mb-3 uppercase px-1">
                                <span>獲利導流比例</span> <span class="text-emerald-400 text-lg"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-8 px-1">
                            <div>
                                <label class="text-[11px] font-black text-slate-400 mb-2 block uppercase tracking-tighter">年化回報 (<span id="ret_val">11</span>%)</label>
                                <input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()">
                            </div>
                            <div>
                                <label class="text-[11px] font-black text-slate-400 mb-2 block uppercase tracking-tighter">投資年限 (<span id="yrs_val">5</span>年)</label>
                                <input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-7/12 space-y-6" ontouchstart="hideKeyboard()">
                <div class="glass-card rounded-[2.5rem] p-8 flex flex-col h-full space-y-8">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">Price Margin</span>
                            <div id="out_margin_text" class="text-5xl font-black text-white mt-2">--</div>
                        </div>
                        <div id="alert_box" class="text-[10px] font-black px-4 py-2 rounded-xl bg-slate-900 border border-white/5 text-slate-500 uppercase tracking-widest">分析中</div>
                    </div>

                    <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden shadow-inner border border-white/5">
                        <div id="margin_bar" class="h-full transition-all duration-1000 ease-out shadow-[0_0_15px_currentColor]" style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">本季建議導流</span>
                            <span id="out_transfer" class="text-3xl font-black text-emerald-400 neon-green tracking-tighter">--</span>
                        </div>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">預期未來資產</span>
                            <span id="out_future" class="text-3xl font-black text-white tracking-tighter">--</span>
                        </div>
                    </div>

                    <div class="flex-grow min-h-[220px]">
                        <canvas id="growthChart"></canvas>
                    </div>

                    <div id="milestone" class="text-[11px] font-black text-center py-4 px-6 rounded-2xl bg-indigo-600/10 text-indigo-300 uppercase tracking-widest border border-indigo-500/20 italic">
                        正在推演財富增長...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null, deferredPrompt = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const worker = reg.installing;
                    worker.onstatechange = () => {
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    };
                };
            });
        }

        async function fetchWithTimeout(url, opts = { timeout: 5000 }) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), opts.timeout);
            const response = await fetch(url, { ...opts, signal: controller.signal });
            clearTimeout(id); return response;
        }

        async function fetchMarketData() {
            uiInteract();
            const bT = document.querySelector('#f-icon').parentNode.querySelector('span'), bI = document.querySelector('#f-icon'), statusText = document.getElementById('sync_status');
            bT.innerText = "BUSY"; bI.className = "fa-solid fa-circle-notch fa-spin";
            
            let fx = null, stk = null;
            const fxUrls = ['https://open.er-api.com/v6/latest/USD', 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json'];
            for(let url of fxUrls) {
                try { const r = await fetchWithTimeout(url); const d = await r.json(); fx = d.rates?.TWD || d.usd?.twd; if(fx) break; } catch(e){}
            }
            const stkUrls = ['https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL', `https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW')}`];
            for(let url of stkUrls) {
                try {
                    const r = await fetchWithTimeout(url); const d = await r.json();
                    if(Array.isArray(d)) stk = parseFloat(d.find(x => x.Code === "0050")?.ClosingPrice);
                    else if(d.chart) stk = d.chart.result[0].meta.regularMarketPrice;
                    if(stk) break;
                } catch(e){}
            }

            if(fx) document.getElementById('fx_rate').value = fx.toFixed(2);
            if(stk) document.getElementById('current_price').value = stk;
            
            if(fx || stk) {
                calculate();
                bI.className = "fa-solid fa-check text-emerald-400"; bT.innerText = "SUCCESS";
                const n = new Date(); statusText.innerText = `最後更新 ${n.getHours()}:${n.getMinutes().toString().padStart(2,'0')}`;
                statusText.className = "text-[11px] text-emerald-400 font-black tracking-widest uppercase mt-0.5";
            } else {
                bI.className = "fa-solid fa-triangle-exclamation text-rose-500"; bT.innerText = "FAIL";
                statusText.innerText = "同步失敗";
            }
            setTimeout(() => { bI.className = "fa-solid fa-rotate"; bT.innerText = "SYNC"; }, 2500);
        }

        function calculate() {
            const c = parseFloat(document.getElementById('cost_price').value) || 0;
            const s = parseFloat(document.getElementById('shares').value) || 0;
            const p = parseFloat(document.getElementById('current_price').value) || 0;
            const fx= parseFloat(document.getElementById('fx_rate').value) || 1;
            const q = parseFloat(document.getElementById('qqq_now').value) || 0;
            const r = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const re= parseFloat(document.getElementById('expected_return').value) || 0;
            const y = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = r;
            document.getElementById('ret_val').innerText = re;
            document.getElementById('yrs_val').innerText = y;

            localStorage.setItem('winner_v5', JSON.stringify({c, s, p, fx, q}));

            const profit = (p - c) * s;
            const margin = p > 0 ? (p - c) / p : 0;
            const roi = c > 0 ? ((p - c) / c) * 100 : 0;
            const netUsd = Math.max(0, (profit * (r / 100)) - (profit * (r / 100) * 0.0045 + 850)) / fx;
            const principal = q + (margin > 0.1 ? netUsd : 0);
            const future = principal * Math.pow(1 + (re / 100), y);

            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(1) + '%';
            document.getElementById('out_transfer').innerText = '$ ' + netUsd.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('out_future').innerText = '$ ' + future.toLocaleString(undefined, {maximumFractionDigits: 0});

            const rb = document.getElementById('roi_badge');
            rb.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
            rb.className = `absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-black px-3 py-1 rounded-full border border-white/10 bg-slate-800 shadow-2xl ${roi >= 0 ? 'text-rose-400' : 'text-emerald-400'}`;

            const mb = document.getElementById('margin_bar'), ab = document.getElementById('alert_box');
            mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            if (margin >= 0.2) { mb.className = "h-full bg-emerald-400 shadow-[0_0_15px_#10b981]"; ab.innerText = "SAFE TO DIVERT"; ab.className = "text-[10px] font-black px-4 py-2 bg-emerald-500/20 text-emerald-400 rounded-xl border border-emerald-500/20"; }
            else if (margin >= 0.1) { mb.className = "h-full bg-amber-400 shadow-[0_0_15px_#f59e0b]"; ab.innerText = "CAUTION"; ab.className = "text-[10px] font-black px-4 py-2 bg-amber-500/20 text-amber-400 rounded-xl border border-amber-500/20"; }
            else { mb.className = "h-full bg-rose-500 shadow-[0_0_15px_#f43f5e]"; ab.innerText = "DANGER"; ab.className = "text-[10px] font-black px-4 py-2 bg-rose-500/20 text-rose-500 rounded-xl border border-rose-500/20"; }

            let mile = `持續投資，${y} 年後的財富自由預估。`;
            const ts = [100000, 250000, 500000, 1000000];
            for (let i = 1; i <= y; i++) {
                let v = principal * Math.pow(1 + (re / 100), i);
                let hit = ts.find(t => v >= t && (principal * Math.pow(1 + (re / 100), i-1)) < t);
                if (hit) { mile = `🚀 目標達成：預計在第 ${i} 年突破 $${hit/10000} 萬美金資產！`; break; }
            }
            document.getElementById('milestone').innerHTML = mile;

            const lbls = [], dta = [];
            for (let i = 0; i <= y; i++) { lbls.push(`Y${i}`); dta.push(principal * Math.pow(1 + (re / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,300); grad.addColorStop(0, 'rgba(16, 185, 129, 0.4)'); grad.addColorStop(1, 'transparent');
            myChart = new Chart(ctx, { type: 'line', data: { labels: lbls, datasets: [{ data: dta, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e293b', bodyFont: {size: 14, weight: 'bold'}, callbacks: { label: c => '$ ' + c.parsed.y.toLocaleString() } } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#94a3b8', font: {size: 10, weight: 'bold'} } } } } });
        }

        function hideKeyboard() { if (document.activeElement?.tagName === 'INPUT') document.activeElement.blur(); }
        function uiInteract() { hideKeyboard(); if (navigator.vibrate) navigator.vibrate(12); }

        window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').classList.add('show'); });
        document.getElementById('install-btn').addEventListener('click', async () => { if(deferredPrompt) { deferredPrompt.prompt(); const {outcome} = await deferredPrompt.userChoice; if(outcome === 'accepted') dismissInstall(); deferredPrompt = null; } });
        function dismissInstall() { document.getElementById('install-banner').classList.remove('show'); }

        window.onload = () => {
            const d = JSON.parse(localStorage.getItem('winner_v5')) || {c: 48, s: 1602, p: 77, fx: 31.4, q: 25660};
            document.getElementById('cost_price').value = d.c; document.getElementById('current_price').value = d.p;
            document.getElementById('shares').value = d.s; document.getElementById('fx_rate').value = d.fx;
            document.getElementById('qqq_now').value = d.q;
            calculate();
        };
    </script>
</body>
</html>
