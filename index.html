<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow 戰情室</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 全息呼吸背景光效 */
        .ambient-light-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, rgba(0,0,0,0) 70%); filter: blur(60px); animation: float 15s ease-in-out infinite alternate; z-index: -1; pointer-events: none; }
        .ambient-light-2 { position: fixed; bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%); filter: blur(60px); animation: float 20s ease-in-out infinite alternate-reverse; z-index: -1; pointer-events: none; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 10%) scale(1.2); } }

        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .input-hero { background: rgba(2, 6, 23, 0.8); border: 2px solid #334155; color: #fff; text-align: center; border-radius: 20px; padding: 16px; font-weight: 900; font-size: 1.5rem; width: 100%; outline: none; transition: all 0.3s ease; }
        .input-hero:focus { border-color: #10b981; box-shadow: 0 0 25px rgba(16, 185, 129, 0.25); transform: translateY(-2px); }
        
        #install-banner { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%); width: calc(100% - 32px); max-width: 500px; z-index: 100; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        #install-banner.show { display: block; transform: translateX(-50%) translateY(0); }
        
        input[type=range] { -webkit-appearance: none; background: transparent; height: 50px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #10b981; margin-top: -11px; border: 4px solid #fff; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); cursor: pointer; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.1); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        
        .text-glow { text-shadow: 0 0 20px currentColor; }
    </style>
</head>

<body class="min-h-screen p-3 md:p-8 flex flex-col items-center pb-32">

    <div class="ambient-light-1"></div>
    <div class="ambient-light-2"></div>

    <div class="w-full max-w-6xl space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 px-2 mb-4">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <img src="icon.png" class="w-16 h-16 rounded-[1.25rem] shadow-2xl border border-white/20">
                <div class="flex-grow">
                    <h1 class="text-2xl font-black italic tracking-tighter text-white">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                        <p id="sync_status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">系統已連線</p>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <div class="glass px-5 py-2 rounded-2xl flex flex-col justify-center items-end hidden md:flex border-indigo-500/20">
                    <span class="text-[9px] text-indigo-300 font-bold uppercase tracking-widest">Global Net Worth</span>
                    <span id="global_networth" class="text-lg font-black text-white">--</span>
                </div>
                <button onclick="fetchMarketData()" class="flex-grow md:flex-grow-0 bg-indigo-600/90 hover:bg-indigo-500 text-white px-6 py-4 rounded-2xl font-black text-sm tracking-widest active:scale-95 transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)] border border-indigo-400/30">
                    <i id="f-icon" class="fa-solid fa-satellite-dish mr-2"></i> <span id="f-text">同步全球數據</span>
                </button>
            </div>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-[45%] space-y-6">
                <div class="glass rounded-[2.5rem] p-6 md:p-8 space-y-8">
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest"><i class="fa-solid fa-hand-holding-dollar text-slate-500 mr-1"></i>0050 均價</label>
                            <input type="number" id="cost_price" value="48" class="input-hero" oninput="calculate()">
                        </div>
                        <div class="space-y-2 relative">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest"><i class="fa-solid fa-arrow-trend-up text-emerald-500 mr-1"></i>0050 市價</label>
                            <input type="number" id="current_price" value="77" class="input-hero text-emerald-400 text-glow" oninput="calculate()">
                            <span id="roi_badge" class="absolute -bottom-3 left-1/2 -translate-x-1/2 text-[10px] font-black px-3 py-1 rounded-full border border-slate-700 bg-slate-900 shadow-2xl z-10">--%</span>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">持有股數</label>
                            <input type="number" id="shares" value="1602" class="input-hero" oninput="calculate()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase tracking-widest">即時匯率</label>
                            <input type="number" id="fx_rate" value="31.4" step="0.1" class="input-hero text-indigo-400" oninput="calculate()">
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-indigo-900/40 to-slate-900/40 p-6 rounded-[2rem] border border-indigo-500/20 shadow-inner">
                        <label class="text-xs font-black text-indigo-300 block mb-2 text-center uppercase tracking-widest"><i class="fa-brands fa-usps mr-1"></i>QQQ 美金戰略儲備</label>
                        <input type="number" id="qqq_now" value="25660" class="w-full bg-transparent border-none text-white text-4xl font-black text-center focus:ring-0 outline-none placeholder-slate-600" oninput="calculate()">
                    </div>

                    <div class="space-y-6 bg-slate-900/40 p-6 rounded-[2rem] border border-white/5" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-xs font-black text-slate-300 mb-2 uppercase">
                                <span>導流火力</span> <span class="text-emerald-400 text-xl text-glow"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-6 pt-2">
                            <div><label class="text-[10px] font-black text-slate-500 block uppercase">年化期望 (<span id="ret_val" class="text-indigo-400">11</span>%)</label><input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()"></div>
                            <div><label class="text-[10px] font-black text-slate-500 block uppercase">作戰年限 (<span id="yrs_val" class="text-emerald-400">5</span>年)</label><input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-[55%] space-y-6" ontouchstart="hideKeyboard()">
                <div class="glass rounded-[2.5rem] p-6 md:p-8 space-y-6 h-full flex flex-col">
                    
                    <div>
                        <div class="flex justify-between items-end mb-3">
                            <div>
                                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Price Margin 價格護城河</span>
                                <div id="out_margin_text" class="text-5xl font-black text-white mt-1">--</div>
                            </div>
                            <div id="alert_box" class="text-[10px] font-black px-4 py-2 rounded-xl bg-slate-900 border border-slate-700 text-slate-400 uppercase tracking-widest">分析中</div>
                        </div>
                        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden shadow-inner mb-4">
                            <div id="margin_bar" class="h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                        </div>
                        
                        <div id="ai_briefing" class="bg-emerald-900/20 border border-emerald-500/20 rounded-2xl p-4 text-sm font-medium text-emerald-100 leading-relaxed">
                            <i class="fa-solid fa-robot text-emerald-400 mr-2"></i> 系統啟動中...
                        </div>
                    </div>

                    <div class="flex-grow min-h-[220px] relative mt-2 bg-slate-900/30 rounded-[2rem] p-4 border border-white/5">
                        <div class="absolute top-6 left-6 z-10">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">執行策略將為您多創造</span>
                            <span id="extra_wealth" class="text-2xl font-black text-emerald-400 text-glow">--</span>
                        </div>
                        <canvas id="growthChart"></canvas>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="install-banner">
        <div class="bg-indigo-900/90 backdrop-blur-xl border-t border-indigo-500/30 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] p-4 flex justify-between items-center rounded-t-3xl md:rounded-3xl md:border md:mb-4">
            <div class="flex items-center gap-4 pl-2">
                <img src="icon.png" class="w-12 h-12 rounded-[1rem] shadow-lg">
                <div>
                    <p class="font-black text-white text-base">安裝 WinnerFlow</p>
                    <p class="text-[10px] text-indigo-300 font-bold mt-0.5" id="install-hint">啟用全螢幕戰情室體驗</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="dismissInstall()" class="text-xs font-bold text-slate-400 px-3 py-2">忽略</button>
                <button id="install-btn" class="bg-emerald-500 text-slate-900 px-5 py-2.5 rounded-xl font-black text-xs shadow-lg active:scale-95 transition-all">一鍵安裝</button>
            </div>
        </div>
    </div>

    <script>
        var myChart = null;
        var deferredPrompt = null;

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(function(err){ console.log(err); });
        }

        var isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (!isStandalone) {
            if (isIos) {
                document.getElementById('install-hint').innerText = "點擊分享按鈕 → 加入主畫面";
                document.getElementById('install-btn').style.display = 'none';
                setTimeout(function() { document.getElementById('install-banner').classList.add('show'); }, 3000);
            } else {
                window.addEventListener('beforeinstallprompt', function(e) {
                    e.preventDefault(); 
                    deferredPrompt = e;
                    setTimeout(function() { document.getElementById('install-banner').classList.add('show'); }, 3000);
                });
            }
        }

        var btnInstall = document.getElementById('install-btn');
        if(btnInstall) {
            btnInstall.addEventListener('click', async function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const choice = await deferredPrompt.userChoice;
                    if (choice.outcome === 'accepted') dismissInstall();
                    deferredPrompt = null;
                }
            });
        }

        function dismissInstall() { 
            var banner = document.getElementById('install-banner');
            if(banner) banner.classList.remove('show'); 
        }

        function fmt(n, p) { return (p || '') + parseFloat(n).toLocaleString('en-US', {maximumFractionDigits: 0}); }
        
        function hideKeyboard() { 
            // 移除所有 ?. 寫法，保證舊手機相容
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur(); 
            }
        }
        
        function uiInteract() { 
            hideKeyboard(); 
            if (navigator.vibrate) navigator.vibrate(15); 
        }

        async function fetchMarketData() {
            uiInteract();
            var bT = document.getElementById('f-text');
            var bI = document.getElementById('f-icon');
            var statusStr = document.getElementById('sync_status');
            
            if(bT) bT.innerText = "連線衛星中..."; 
            if(bI) bI.className = "fa-solid fa-satellite-dish fa-spin";
            
            let fx = null, stk = null;
            try { 
                const r = await fetch('https://open.er-api.com/v6/latest/USD'); 
                const d = await r.json(); 
                if(d && d.rates) fx = d.rates.TWD; 
            } catch(e){}
            
            try { 
                const r = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'); 
                const d = await r.json(); 
                // 移除 ?. 寫法，改用傳統過濾
                var targetStock = null;
                for(var i=0; i<d.length; i++) {
                    if(d[i].Code === "0050") { targetStock = d[i]; break; }
                }
                if(targetStock) stk = parseFloat(targetStock.ClosingPrice);
            } catch(e){}

            if (fx && document.getElementById('fx_rate')) document.getElementById('fx_rate').value = fx.toFixed(2);
            if (stk && document.getElementById('current_price')) document.getElementById('current_price').value = stk;
            
            if (fx || stk) {
                calculate();
                if(bI) bI.className = "fa-solid fa-check text-emerald-400"; 
                if(bT) bT.innerText = "全球同步完成";
                var n = new Date(); 
                if(statusStr) {
                    var hrs = n.getHours();
                    var mins = n.getMinutes().toString().padStart(2,'0');
                    statusStr.innerText = "最新快照: " + hrs + ":" + mins;
                    statusStr.className = "text-[10px] font-bold text-emerald-400 uppercase tracking-widest mt-1";
                }
            } else {
                if(bI) bI.className = "fa-solid fa-xmark text-rose-500"; 
                if(bT) bT.innerText = "訊號中斷";
            }
            setTimeout(function() { 
                if(bI) bI.className = "fa-solid fa-satellite-dish"; 
                if(bT) bT.innerText = "同步全球數據"; 
            }, 3000);
        }

        function calculate() {
            var c = parseFloat(document.getElementById('cost_price').value) || 0;
            var cur = parseFloat(document.getElementById('current_price').value) || 0;
            var s = parseFloat(document.getElementById('shares').value) || 0;
            var fx = parseFloat(document.getElementById('fx_rate').value) || 1;
            var q = parseFloat(document.getElementById('qqq_now').value) || 0;
            var r = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            var re = parseFloat(document.getElementById('expected_return').value) || 0;
            var y = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = r;
            document.getElementById('ret_val').innerText = re;
            document.getElementById('yrs_val').innerText = y;

            try {
                localStorage.setItem('winner_v10_safe', JSON.stringify({c:c, cur:cur, s:s, fx:fx, q:q}));
            } catch(e) {}

            var totalTwd = cur * s;
            var totalUsdInTwd = q * fx;
            var globalNetWorth = totalTwd + totalUsdInTwd;
            if(document.getElementById('global_networth')) {
                document.getElementById('global_networth').innerText = fmt(globalNetWorth, 'NT$ ');
            }

            var profit = (cur - c) * s;
            var margin = cur > 0 ? (cur - c) / cur : 0;
            var roi = c > 0 ? ((cur - c) / c) * 100 : 0;
            
            var extractTwd = profit * (r / 100);
            var friction = extractTwd > 0 ? (extractTwd * 0.004425 + 850) : 0;
            var netUsd = Math.max(0, extractTwd - friction) / fx;
            
            var willDivert = margin >= 0.1;
            var futureWithStrategy = (q + (willDivert ? netUsd : 0)) * Math.pow(1 + (re / 100), y);
            var futureWithoutStrategy = q * Math.pow(1 + (re / 100), y);
            var extraWealth = futureWithStrategy - futureWithoutStrategy;

            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(1) + '%';
            document.getElementById('extra_wealth').innerText = fmt(extraWealth, '+$');

            var roiB = document.getElementById('roi_badge');
            if(roiB) {
                roiB.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
                roiB.className = "absolute -bottom-3 left-1/2 -translate-x-1/2 text-[11px] font-black px-3 py-1 rounded-full border border-slate-700 bg-slate-900 shadow-2xl z-10 " + (roi >= 0 ? 'text-emerald-400' : 'text-rose-400');
            }

            var mb = document.getElementById('margin_bar');
            var ab = document.getElementById('alert_box');
            var ai = document.getElementById('ai_briefing');
            
            if(mb) mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            
            if (margin >= 0.2) { 
                if(mb) mb.className = "h-full
