<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow | 贏家精煉版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 加大輸入框與對比 */
        .input-box { background: #020617; border: 2px solid #334155; color: #fff; text-align: center; border-radius: 12px; padding: 12px; font-weight: 800; font-size: 1.15rem; width: 100%; outline: none; }
        .input-box:focus { border-color: #10b981; }
        
        /* 自訂滑桿 */
        input[type=range] { -webkit-appearance: none; background: transparent; height: 35px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #10b981; margin-top: -8px; border: 3px solid #fff; }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-5xl space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 px-2">
            <div class="flex items-center gap-4 text-center md:text-left">
                <img src="icon.png" class="w-14 h-14 rounded-2xl shadow-xl border border-white/10">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <p id="sync_status" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">尚未同步市場數據</p>
                </div>
            </div>
            <button onclick="fetchMarketData()" class="w-full md:w-auto bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black text-sm tracking-widest hover:bg-emerald-500 transition-all flex justify-center items-center gap-2 active:scale-95 shadow-lg shadow-emerald-900/20">
                <i id="f-icon" class="fa-solid fa-rotate"></i> <span id="f-text">同步市場數據</span>
            </button>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-5/12 space-y-4">
                <div class="card p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase">買進均價</label>
                            <input type="number" id="cost_price" class="input-box" oninput="calculate()">
                        </div>
                        <div class="space-y-1 relative">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase">目前市價</label>
                            <input type="number" id="current_price" class="input-box text-emerald-400" oninput="calculate()">
                            <span id="roi_badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black shadow-xl">--%</span>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase">持有股數</label>
                            <input type="number" id="shares" class="input-box" oninput="calculate()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-black text-slate-400 block text-center uppercase">即時匯率</label>
                            <input type="number" id="fx_rate" class="input-box text-indigo-400" oninput="calculate()">
                        </div>
                    </div>

                    <div class="bg-indigo-950/30 p-5 rounded-2xl border border-indigo-500/20">
                        <label class="text-[10px] font-black text-indigo-300 block mb-2 text-center uppercase">QQQ 目前美金水位</label>
                        <input type="number" id="qqq_now" class="w-full bg-transparent border-none text-white text-3xl font-black text-center focus:ring-0 outline-none" oninput="calculate()">
                    </div>

                    <div class="space-y-6" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-[11px] font-black text-slate-400 mb-2 uppercase">
                                <span>導流比例</span> <span class="text-emerald-400 text-sm"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-black text-slate-500 mb-1 block uppercase">年化 (<span id="ret_val">11</span>%)</label>
                                <input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-500 mb-1 block uppercase">年限 (<span id="yrs_val">5</span>年)</label>
                                <input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-7/12 space-y-4" ontouchstart="hideKeyboard()">
                <div class="card p-6 space-y-6 h-full flex flex-col">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-black text-slate-500 uppercase italic">Safety Margin</span>
                            <div id="out_margin_text" class="text-4xl font-black text-white mt-1">--</div>
                        </div>
                        <div id="alert_box" class="text-[10px] font-bold px-3 py-1.5 rounded-xl bg-slate-900 border border-slate-700 text-slate-400 uppercase tracking-widest">系統待命</div>
                    </div>

                    <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
                        <div id="margin_bar" class="h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-emerald-500/5 p-4 rounded-2xl border border-emerald-500/10 text-center">
                            <span class="text-[9px] font-black text-emerald-500/60 block mb-1 uppercase">本季預估導流淨額</span>
                            <span id="out_transfer" class="text-2xl font-black text-emerald-400">--</span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                            <span class="text-[9px] font-black text-slate-500 block mb-1 uppercase tracking-widest">未來預估資產</span>
                            <span id="out_future" class="text-2xl font-black text-white">--</span>
                        </div>
                    </div>

                    <div class="flex-grow min-h-[180px] mt-2">
                        <canvas id="growthChart"></canvas>
                    </div>

                    <div id="milestone" class="text-[10px] font-bold text-center py-3 px-4 rounded-xl bg-indigo-500/5 text-indigo-300 uppercase tracking-widest border border-indigo-500/10 italic">
                        分析中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const worker = reg.installing;
                    worker.onstatechange = () => {
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
                    };
                };
            });
        }

        async function fetchWithTimeout(url, opts = { timeout: 5000 }) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), opts.timeout);
            const res = await fetch(url, { ...opts, signal: controller.signal });
            clearTimeout(id); return res;
        }

        async function fetchMarketData() {
            uiInteract();
            const bT = document.getElementById('f-text'), bI = document.getElementById('f-icon'), sS = document.getElementById('sync_status');
            bT.innerText = "資料同步中..."; bI.className = "fa-solid fa-circle-notch fa-spin";
            
            let fx = null, stk = null;
            // 匯率 API 備援
            try { const r = await fetchWithTimeout('https://open.er-api.com/v6/latest/USD'); const d = await r.json(); fx = d.rates.TWD; } 
            catch(e) { try { const r = await fetchWithTimeout('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json'); const d = await r.json(); fx = d.usd.twd; } catch(e2){} }

            // 股價 API 備援
            try { const r = await fetchWithTimeout('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'); const d = await r.json(); stk = parseFloat(d.find(x => x.Code === "0050")?.ClosingPrice); } 
            catch(e) { try { const u = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW'); const r = await fetchWithTimeout(`https://api.allorigins.win/raw?url=${u}`); const d = await r.json(); stk = d.chart.result[0].meta.regularMarketPrice; } catch(e2){} }

            if (fx) document.getElementById('fx_rate').value = fx.toFixed(2);
            if (stk) document.getElementById('current_price').value = stk;
            
            if (fx || stk) {
                calculate();
                bI.className = "fa-solid fa-check text-emerald-400"; bT.innerText = "同步完成";
                const n = new Date(); sS.innerText = `最後更新 ${n.getHours()}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
                sS.className = "text-[10px] text-emerald-400 font-bold tracking-widest uppercase mt-1";
            } else {
                bI.className = "fa-solid fa-xmark text-rose-500"; bT.innerText = "連線異常";
                sS.innerText = "同步失敗，請手動輸入"; sS.className = "text-[10px] text-rose-500 font-bold uppercase tracking-widest mt-1";
            }
            setTimeout(() => { bI.className = "fa-solid fa-rotate"; bT.innerText = "同步市場數據"; }, 3000);
        }

        function calculate() {
            const c = parseFloat(document.getElementById('cost_price').value) || 0;
            const cur = parseFloat(document.getElementById('current_price').value) || 0;
            const s = parseFloat(document.getElementById('shares').value) || 0;
            const fx = parseFloat(document.getElementById('fx_rate').value) || 1;
            const q = parseFloat(document.getElementById('qqq_now').value) || 0;
            const r = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const re = parseFloat(document.getElementById('expected_return').value) || 0;
            const y = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = r;
            document.getElementById('ret_val').innerText = re;
            document.getElementById('yrs_val').innerText = y;

            localStorage.setItem('winner_v6', JSON.stringify({c, cur, s, fx, q}));

            const profit = (cur - c) * s;
            const margin = cur > 0 ? (cur - c) / cur : 0;
            const roi = c > 0 ? ((cur - c) / c) * 100 : 0;
            const netUsd = Math.max(0, (profit * (r / 100)) - (profit * (r / 100) * 0.004425 + 850)) / fx;
            const principal = q + (margin > 0.1 ? netUsd : 0);
            const future = principal * Math.pow(1 + (re / 100), y);

            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(2) + '%';
            document.getElementById('out_transfer').innerText = '$ ' + netUsd.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('out_future').innerText = '$ ' + future.toLocaleString(undefined, {maximumFractionDigits: 0});

            const rb = document.getElementById('roi_badge');
            rb.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
            rb.className = `absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black shadow-xl ${roi >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;

            const mb = document.getElementById('margin_bar'), ab = document.getElementById('alert_box');
            mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            if (margin >= 0.2) { mb.className = "h-full bg-emerald-500 shadow-[0_0_15px_#10b981]"; ab.innerText = "水位安全"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 uppercase tracking-widest"; }
            else if (margin >= 0.1) { mb.className = "h-full bg-amber-500 shadow-[0_0_15px_#f59e0b]"; ab.innerText = "護城河縮減"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/30 text-amber-400 uppercase tracking-widest"; }
            else { mb.className = "h-full bg-rose-500 shadow-[0_0_15px_#f43f5e]"; ab.innerText = "暫停導流"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-500 uppercase tracking-widest"; }

            let mile = `${y} 年後的財富增長預測。`;
            const ts = [100000, 250000, 500000, 1000000];
            for (let i = 1; i <= y; i++) {
                let v = principal * Math.pow(1 + (re / 100), i);
                let hit = ts.find(t => v >= t && (principal * Math.pow(1 + (re / 100), i-1)) < t);
                if (hit) { mile = `🚀 第 ${i} 年將突破 $${hit/10000} 萬美金大關！`; break; }
            }
            document.getElementById('milestone').innerHTML = mile;

            const lbls = [], dta = [];
            for (let i = 0; i <= y; i++) { lbls.push(`Y${i}`); dta.push(principal * Math.pow(1 + (re / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,200); grad.addColorStop(0, 'rgba(16, 185, 129, 0.2)'); grad.addColorStop(1, 'transparent');
            myChart = new Chart(ctx, { type: 'line', data: { labels: lbls, datasets: [{ data: dta, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 3, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: {size: 9, weight: 'bold'} } } } } });
        }

        function hideKeyboard() { if (document.activeElement?.tagName === 'INPUT') document.activeElement.blur(); }
        function uiInteract() { hideKeyboard(); if (navigator.vibrate) navigator.vibrate(12); }

        window.onload = () => {
            const d = JSON.parse(localStorage.getItem('winner_v6')) || {c: 48, cur: 77, s: 1602, fx: 31.4, q: 25660};
            document.getElementById('cost_price').value = d.c; document.getElementById('current_price').value = d.cur;
            document.getElementById('shares').value = d.s; document.getElementById('fx_rate').value = d.fx;
            document.getElementById('qqq_now').value = d.q;
            calculate();
        };
    </script>
</body>
</html>
