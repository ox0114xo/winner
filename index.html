<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow 戰情室</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background: #020617; color: #f8fafc; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .ambient-light-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, rgba(0,0,0,0) 70%); filter: blur(60px); z-index: -1; pointer-events: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .input-hero { background: rgba(2, 6, 23, 0.9); border: 2px solid #334155; color: #fff; text-align: center; border-radius: 16px; padding: 14px; font-weight: 900; font-size: 1.3rem; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-hero:focus { border-color: #10b981; }
        input[type=range] { -webkit-appearance: none; background: transparent; height: 40px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: #10b981; margin-top: -9px; border: 3px solid #fff; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .text-glow { text-shadow: 0 0 15px currentColor; }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="ambient-light-1"></div>

    <div class="w-full max-w-5xl space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 px-2">
            <div class="flex items-center gap-4 text-center md:text-left">
                <img src="icon.png" class="w-14 h-14 rounded-2xl border border-white/10" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter text-white">WINNER<span class="text-emerald-400">FLOW</span></h1>
                    <p id="sync_status" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mt-1">系統啟動成功</p>
                </div>
            </div>
            
            <button onclick="fetchMarketData()" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-black text-sm tracking-widest active:scale-95 transition-all shadow-lg border border-indigo-400/30">
                <i id="f-icon" class="fa-solid fa-satellite-dish"></i> <span id="f-text">同步市場數據</span>
            </button>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-[45%] space-y-6">
                <div class="glass p-6 md:p-8 space-y-6 border-t border-emerald-500/20">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 block text-center uppercase">0050 均價</label>
                            <input type="number" id="cost_price" value="48" class="input-hero" oninput="safeCalculate()">
                        </div>
                        <div class="space-y-1 relative">
                            <label class="text-[10px] font-black text-slate-400 block text-center uppercase">0050 市價</label>
                            <input type="number" id="current_price" value="77" class="input-hero text-emerald-400 text-glow" oninput="safeCalculate()">
                            <span id="roi_badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black shadow-xl z-10">--%</span>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 block text-center uppercase">持有股數</label>
                            <input type="number" id="shares" value="1602" class="input-hero" oninput="safeCalculate()">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 block text-center uppercase">即時匯率</label>
                            <input type="number" id="fx_rate" value="31.4" step="0.1" class="input-hero text-indigo-400" oninput="safeCalculate()">
                        </div>
                    </div>

                    <div class="bg-slate-900/50 p-5 rounded-2xl border border-indigo-500/10">
                        <label class="text-[10px] font-black text-indigo-300 block mb-2 text-center uppercase tracking-widest">QQQ 美金庫存</label>
                        <input type="number" id="qqq_now" value="25660" class="w-full bg-transparent border-none text-white text-3xl font-black text-center focus:ring-0 outline-none" oninput="safeCalculate()">
                    </div>

                    <div class="space-y-4" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-[11px] font-black text-slate-300 mb-1 uppercase">
                                <span>導流火力</span> <span class="text-emerald-400 text-lg"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); safeCalculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[9px] font-black text-slate-500 block">年化 (<span id="ret_val">11</span>%)</label><input type="range" id="expected_return" min="1" max="25" value="11" class="w-full" oninput="uiInteract(); safeCalculate()"></div>
                            <div><label class="text-[9px] font-black text-slate-500 block">年限 (<span id="yrs_val">5</span>年)</label><input type="range" id="years" min="1" max="30" value="5" class="w-full" oninput="uiInteract(); safeCalculate()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-[55%] space-y-6" ontouchstart="hideKeyboard()">
                <div class="glass p-6 md:p-8 space-y-6 h-full flex flex-col">
                    
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Price Margin</span>
                                <div id="out_margin_text" class="text-4xl font-black text-white mt-1">--</div>
                            </div>
                            <div id="alert_box" class="text-[10px] font-bold px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-700 text-slate-400">系統重置中</div>
                        </div>
                        <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden mb-4">
                            <div id="margin_bar" class="h-full transition-all duration-500 bg-emerald-500" style="width: 0%"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-emerald-900/20 p-4 rounded-xl border border-emerald-500/10 text-center">
                                <span class="text-[9px] font-bold text-emerald-500/80 block mb-1 uppercase">本季淨導流</span>
                                <span id="out_transfer" class="text-xl font-black text-emerald-400">--</span>
                            </div>
                            <div class="bg-white/5 p-4 rounded-xl border border-white/5 text-center">
                                <span class="text-[9px] font-bold text-slate-400 block mb-1 uppercase">未來總資產</span>
                                <span id="out_future" class="text-xl font-black text-white">--</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex-grow min-h-[150px] relative mt-2">
                        <canvas id="growthChart"></canvas>
                    </div>

                    <div id="milestone" class="text-[10px] font-bold text-center py-3 px-4 rounded-xl bg-indigo-500/10 text-indigo-300 uppercase border border-indigo-500/20">
                        資料計算中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🚀 【第一步：強制獵殺所有壞掉的快取 (Service Worker)】
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(var i = 0; i < registrations.length; i++) {
                    registrations[i].unregister();
                    console.log("已清除舊版快取");
                }
            });
        }

        var myChart = null;

        // 安全數字格式化
        function fmt(n, p) { 
            var num = parseFloat(n);
            if (isNaN(num)) return (p || '') + '0';
            return (p || '') + num.toLocaleString('en-US', {maximumFractionDigits: 0}); 
        }

        function hideKeyboard() { 
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.blur(); 
            }
        }
        function uiInteract() { hideKeyboard(); }

        // 🚀 【第二步：超強防護的計算函數】
        function safeCalculate() {
            try {
                // 1. 取得所有輸入框，若有空值或怪字元，強制給予安全數字
                var c = parseFloat(document.getElementById('cost_price').value);
                if(isNaN(c) || c <= 0) c = 48;
                
                var cur = parseFloat(document.getElementById('current_price').value);
                if(isNaN(cur) || cur <= 0) cur = 77;
                
                var s = parseFloat(document.getElementById('shares').value);
                if(isNaN(s) || s < 0) s = 1602;
                
                var fx = parseFloat(document.getElementById('fx_rate').value);
                if(isNaN(fx) || fx <= 0) fx = 31.4; // 絕對不能讓匯率為0，否則會算出 Infinity
                
                var q = parseFloat(document.getElementById('qqq_now').value);
                if(isNaN(q) || q < 0) q = 25660;

                var r = parseFloat(document.getElementById('transfer_ratio').value) || 25;
                var re = parseFloat(document.getElementById('expected_return').value) || 11;
                var y = parseInt(document.getElementById('years').value) || 5;

                // 2. 更新滑桿文字
                document.getElementById('ratio_val').innerText = r;
                document.getElementById('ret_val').innerText = re;
                document.getElementById('yrs_val').innerText = y;

                // 3. 儲存進乾淨的記憶體空間
                localStorage.setItem('winner_v12_clean', JSON.stringify({c:c, cur:cur, s:s, fx:fx, q:q}));

                // 4. 核心數學計算
                var profit = (cur - c) * s;
                var margin = (cur - c) / cur;
                var roi = ((cur - c) / c) * 100;
                
                var extractTwd = profit * (r / 100);
                var friction = extractTwd > 0 ? (extractTwd * 0.004425 + 850) : 0;
                var netUsd = 0;
                if (extractTwd - friction > 0) {
                    netUsd = (extractTwd - friction) / fx;
                }
                
                var willDivert = margin >= 0.1;
                var principal = q + (willDivert ? netUsd : 0);
                var future = principal * Math.pow(1 + (re / 100), y);

                // 5. 寫入畫面
                document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(1) + '%';
                document.getElementById('out_transfer').innerText = fmt(netUsd, '$');
                document.getElementById('out_future').innerText = fmt(future, '$');

                var roiB = document.getElementById('roi_badge');
                roiB.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
                roiB.className = "absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black z-10 " + (roi >= 0 ? 'text-emerald-400' : 'text-rose-400');

                var mb = document.getElementById('margin_bar');
                var ab = document.getElementById('alert_box');
                
                mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
                
                if (margin >= 0.2) { 
                    mb.className = "h-full bg-emerald-500"; 
                    ab.innerText = "SAFE 建議導流"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-emerald-500/20 text-emerald-400";
                } else if (margin >= 0.1) { 
                    mb.className = "h-full bg-amber-500"; 
                    ab.innerText = "WARN 保守導流"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-amber-500/20 text-amber-400";
                } else { 
                    mb.className = "h-full bg-rose-500"; 
                    ab.innerText = "STOP 暫停操作"; ab.className = "text-[10px] font-bold px-3 py-1.5 rounded-lg bg-rose-500/20 text-rose-500";
                }

                // 6. 圖表繪製 (包裝在 try-catch 防止 Chart.js 載入失敗時卡死全站)
                try {
                    if (typeof Chart !== 'undefined') {
                        var lbls = [], dta = [];
                        for (var i = 0; i <= y; i++) { 
                            lbls.push("Y" + i); 
                            dta.push(principal * Math.pow(1 + (re / 100), i)); 
                        }
                        if (myChart) myChart.destroy();
                        var ctx = document.getElementById('growthChart').getContext('2d');
                        var grad = ctx.createLinearGradient(0,0,0,150); 
                        grad.addColorStop(0, 'rgba(16, 185, 129, 0.3)'); 
                        grad.addColorStop(1, 'transparent');
                        
                        myChart = new Chart(ctx, { 
                            type: 'line', 
                            data: { 
                                labels: lbls, 
                                datasets: [{ data: dta, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] 
                            }, 
                            options: { 
                                responsive: true, maintainAspectRatio: false, 
                                plugins: { legend: { display: false } }, 
                                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b', font: {size: 10} } } } 
                            } 
                        });
                    }
                } catch(err) { console.log("圖表暫不顯示"); }
                
                document.getElementById('milestone').innerText = "✅ 計算完成，系統運作正常";

            } catch(e) {
                console.log("計算發生錯誤", e);
                document.getElementById('milestone').innerText = "⚠️ 系統自我修復中...";
            }
        }

        // 🚀 【第三步：API 超時防卡死連線系統】
        function fetchWithTimeout(url, timeoutLimit) {
            return Promise.race([
                fetch(url),
                new Promise(function(_, reject) {
                    setTimeout(function() { reject(new Error('timeout')); }, timeoutLimit);
                })
            ]);
        }

        async function fetchMarketData() {
            uiInteract();
            var bT = document.getElementById('f-text');
            var bI = document.getElementById('f-icon');
            var statusStr = document.getElementById('sync_status');
            
            bT.innerText = "連線中(最長5秒)"; 
            bI.className = "fa-solid fa-satellite-dish fa-spin";
            
            let fx = null, stk = null;
            
            // 嘗試連線匯率 (5秒放棄)
            try { 
                const res1 = await fetchWithTimeout('https://open.er-api.com/v6/latest/USD', 5000); 
                const data1 = await res1.json(); 
                if(data1 && data1.rates) fx = data1.rates.TWD; 
            } catch(e){ console.log("匯率連線超時"); }
            
            // 嘗試連線台股 (5秒放棄)
            try { 
                const res2 = await fetchWithTimeout('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL', 5000); 
                const data2 = await res2.json(); 
                for(var i=0; i<data2.length; i++) {
                    if(data2[i].Code === "0050") { stk = parseFloat(data2[i].ClosingPrice); break; }
                }
            } catch(e){ console.log("股價連線超時"); }

            if (fx && fx > 0) document.getElementById('fx_rate').value = fx.toFixed(2);
            if (stk && stk > 0) document.getElementById('current_price').value = stk;
            
            // 只要有拿到一個資料，就算成功
            if (fx || stk) {
                safeCalculate();
                bI.className = "fa-solid fa-check text-emerald-400"; 
                bT.innerText = "同步完成";
                var n = new Date(); 
                statusStr.innerText = "最後更新: " + n.getHours() + ":" + n.getMinutes().toString().padStart(2,'0');
                statusStr.className = "text-[10px] font-bold text-emerald-400 uppercase tracking-widest mt-1";
            } else {
                bI.className = "fa-solid fa-xmark text-rose-500"; 
                bT.innerText = "連線失敗";
                statusStr.innerText = "API無回應，請手動輸入";
                statusStr.className = "text-[10px] font-bold text-rose-500 uppercase tracking-widest mt-1";
            }
            
            // 3秒後恢復按鈕
            setTimeout(function() { 
                bI.className = "fa-solid fa-satellite-dish"; 
                bT.innerText = "同步市場數據"; 
            }, 3000);
        }

        // 🚀 【第四步：啟動自我修復機制】
        function initApp() {
            var defaults = {c: 48, cur: 77, s: 1602, fx: 31.4, q: 25660};
            
            try {
                var saved = localStorage.getItem('winner_v12_clean');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    // 嚴格檢查取出來的資料是不是健康的數字
                    if(parsed && !isNaN(parseFloat(parsed.c))) defaults.c = parseFloat(parsed.c);
                    if(parsed && !isNaN(parseFloat(parsed.cur))) defaults.cur = parseFloat(parsed.cur);
                    if(parsed && !isNaN(parseFloat(parsed.s))) defaults.s = parseFloat(parsed.s);
                    if(parsed && !isNaN(parseFloat(parsed.fx))) defaults.fx = parseFloat(parsed.fx);
                    if(parsed && !isNaN(parseFloat(parsed.q))) defaults.q = parseFloat(parsed.q);
                }
            } catch(e) {
                // 如果快取中毒，直接洗掉重來
                localStorage.removeItem('winner_v12_clean');
            }
            
            document.getElementById('cost_price').value = defaults.c; 
            document.getElementById('current_price').value = defaults.cur;
            document.getElementById('shares').value = defaults.s; 
            document.getElementById('fx_rate').value = defaults.fx;
            document.getElementById('qqq_now').value = defaults.q;
            
            safeCalculate();
        }

        // 保證第一時間執行
        initApp();

    </script>
</body>
</html>
