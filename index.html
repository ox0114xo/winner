<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow | 旗艦穩定版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #000; color: #E2E8F0; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box { background: #0f172a; border: 1px solid #1e293b; color: #fff; text-align: center; border-radius: 12px; outline: none; width: 100%; padding: 12px; font-weight: 900; }
        .input-box:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        input[type=range] { -webkit-appearance: none; background: transparent; height: 30px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #10b981; margin-top: -7px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .neon-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center pb-10">

    <div class="w-full max-w-5xl px-4 py-8 space-y-6">
        
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="icon.png" class="w-12 h-12 rounded-xl border border-emerald-500/20">
                <div>
                    <h1 class="text-xl font-black text-white italic tracking-tighter">WINNER<span class="text-emerald-500">FLOW</span></h1>
                    <p id="last_sync" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">尚未同步數據</p>
                </div>
            </div>
            <button onclick="fetchMarketData()" class="bg-slate-900 border border-slate-700 text-emerald-400 px-5 py-2.5 rounded-xl font-black text-[10px] tracking-widest hover:bg-slate-800 transition-all flex items-center gap-2 active:scale-90">
                <i id="f-icon" class="fa-solid fa-satellite-dish"></i> <span id="f-text">SYNC DATA</span>
            </button>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-5/12 space-y-4">
                <div class="glass-card rounded-[2rem] p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-500 uppercase block text-center">買進均價</label>
                            <input type="number" id="cost_price" class="input-box text-lg" oninput="calculate()">
                        </div>
                        <div class="space-y-1.5 relative">
                            <label class="text-[10px] font-black text-slate-500 uppercase block text-center">目前市價</label>
                            <input type="number" id="current_price" class="input-box text-lg text-emerald-400 neon-glow" oninput="calculate()">
                            <span id="roi_badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[8px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black shadow-xl">--%</span>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-500 uppercase block text-center">持有股數</label>
                            <input type="number" id="shares" class="input-box text-lg" oninput="calculate()">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-slate-500 uppercase block text-center">即時匯率</label>
                            <input type="number" id="fx_rate" class="input-box text-lg text-indigo-400" oninput="calculate()">
                        </div>
                    </div>

                    <div class="bg-slate-900/60 p-5 rounded-2xl border border-indigo-500/10">
                        <label class="text-[9px] font-black text-indigo-400 tracking-widest uppercase block mb-2 text-center">QQQ 現有資產 (USD)</label>
                        <input type="number" id="qqq_now" class="w-full bg-transparent border-none text-white text-3xl font-black text-center outline-none focus:ring-0" oninput="calculate()">
                    </div>

                    <div class="space-y-5" ontouchstart="hideKeyboard()">
                        <div class="px-2">
                            <div class="flex justify-between text-[10px] font-black text-slate-500 mb-2 uppercase">
                                <span>獲利導流比例</span> <span class="text-emerald-500"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-6 px-2">
                            <div>
                                <label class="text-[9px] font-black text-slate-500 mb-1 block uppercase">年化 (<span id="ret_val">11</span>%)</label>
                                <input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-500 mb-1 block uppercase">年限 (<span id="yrs_val">5</span>年)</label>
                                <input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-7/12 space-y-4" ontouchstart="hideKeyboard()">
                <div class="glass-card rounded-[2rem] p-6 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest italic">Price Margin</span>
                            <div id="out_margin_text" class="text-4xl font-black text-white mt-1 neon-glow">--</div>
                        </div>
                        <div id="alert_status" class="text-[9px] font-bold px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-500 uppercase tracking-widest">系統待命</div>
                    </div>

                    <div class="w-full bg-slate-900 h-1.5 rounded-full mb-8 overflow-hidden">
                        <div id="margin_bar" class="h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-emerald-500/5 p-4 rounded-2xl border border-emerald-500/10">
                            <span class="text-[8px] font-bold text-emerald-500/60 uppercase tracking-widest block mb-1">本季預估導流</span>
                            <span id="out_transfer" class="text-xl font-black text-emerald-400">--</span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest block mb-1">未來預估資產</span>
                            <span id="out_future" class="text-xl font-black text-white">--</span>
                        </div>
                    </div>

                    <div class="flex-grow min-h-[180px] mb-4">
                        <canvas id="growthChart"></canvas>
                    </div>

                    <div id="milestone" class="text-[9px] font-bold text-center py-3 px-4 rounded-xl bg-indigo-500/5 border border-indigo-500/10 text-indigo-400 uppercase tracking-widest">
                        數據計算中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        // PWA 註冊
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        function fmt(n, p = '') { return p + parseFloat(n).toLocaleString('en-US', {maximumFractionDigits: 0}); }
        function hideKeyboard() { if (document.activeElement?.tagName === 'INPUT') document.activeElement.blur(); }
        function uiInteract() { hideKeyboard(); if (navigator.vibrate) navigator.vibrate(10); }

        // --- 核心同步邏輯 (多重備援) ---
        async function fetchMarketData() {
            uiInteract();
            const bT = document.getElementById('f-text'), bI = document.getElementById('f-icon'), syncT = document.getElementById('last_sync');
            bT.innerText = "SYNCING..."; bI.className = "fa-solid fa-circle-notch fa-spin";
            
            let fx = null, stk = null;

            // 1. 抓取匯率 (多備援)
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json(); fx = d.rates.TWD;
            } catch(e) {
                try {
                    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const d = await r.json(); fx = d.usd.twd;
                } catch(e2) {}
            }

            // 2. 抓取股價 (TWSE 官方 + 備援 Proxy)
            try {
                const r = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                const d = await r.json();
                const s = d.find(x => x.Code === "0050");
                stk = parseFloat(s.ClosingPrice);
            } catch(e) {
                try {
                    const u = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW');
                    const r = await fetch(`https://api.allorigins.win/raw?url=${u}`);
                    const d = await r.json();
                    stk = d.chart.result[0].meta.regularMarketPrice;
                } catch(e2) {}
            }

            // 更新結果
            if (fx) document.getElementById('fx_rate').value = fx.toFixed(2);
            if (stk) document.getElementById('current_price').value = stk;
            
            if (fx || stk) {
                calculate();
                bI.className = "fa-solid fa-check text-emerald-500";
                bT.innerText = "SUCCESS";
                const now = new Date();
                syncT.innerText = `最後同步: ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                syncT.className = "text-[9px] text-emerald-500 font-bold uppercase tracking-widest";
            } else {
                bI.className = "fa-solid fa-xmark text-rose-500";
                bT.innerText = "FAILED";
            }

            setTimeout(() => { bI.className = "fa-solid fa-satellite-dish"; bT.innerText = "SYNC DATA"; }, 3000);
        }

        function calculate() {
            const c = parseFloat(document.getElementById('cost_price').value) || 0;
            const s = parseFloat(document.getElementById('shares').value) || 0;
            const cur = parseFloat(document.getElementById('current_price').value) || 0;
            const fx = parseFloat(document.getElementById('fx_rate').value) || 1;
            const q = parseFloat(document.getElementById('qqq_now').value) || 0;
            const rat = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const ret = parseFloat(document.getElementById('expected_return').value) || 0;
            const yrs = parseInt(document.getElementById('years').value) || 0;

            document.getElementById('ratio_val').innerText = rat;
            document.getElementById('ret_val').innerText = ret;
            document.getElementById('yrs_val').innerText = yrs;

            localStorage.setItem('winner_v3', JSON.stringify({c, s, cur, fx, q}));

            const profit = (cur - c) * s;
            const margin = cur > 0 ? (cur - c) / cur : 0;
            const roi = c > 0 ? ((cur - c) / c) * 100 : 0;
            const netUsd = Math.max(0, (profit * (rat / 100)) - (profit * (rat / 100) * 0.004425 + 850)) / fx;
            const principal = q + (margin > 0.1 ? netUsd : 0);
            const future = principal * Math.pow(1 + (ret / 100), yrs);

            // UI
            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(2) + '%';
            document.getElementById('out_transfer').innerText = '$ ' + netUsd.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('out_future').innerText = '$ ' + future.toLocaleString(undefined, {maximumFractionDigits: 0});

            const roiB = document.getElementById('roi_badge');
            roiB.innerText = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
            roiB.className = `absolute -bottom-2 left-1/2 -translate-x-1/2 text-[8px] font-black px-2 py-0.5 rounded-full border border-slate-700 bg-black shadow-xl ${roi >= 0 ? 'text-emerald-500' : 'text-rose-500'}`;

            const mb = document.getElementById('margin_bar'), ast = document.getElementById('alert_status');
            mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            if (margin >= 0.2) { mb.className = "h-full bg-emerald-500 shadow-[0_0_15px_#10b981]"; ast.innerText = "SAFE"; ast.className = "text-[9px] font-bold px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-500 uppercase tracking-widest"; }
            else if (margin >= 0.1) { mb.className = "h-full bg-amber-500 shadow-[0_0_15px_#f59e0b]"; ast.innerText = "WARNING"; ast.className = "text-[9px] font-bold px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/30 text-amber-500 uppercase tracking-widest"; }
            else { mb.className = "h-full bg-rose-500 shadow-[0_0_15px_#f43f5e]"; ast.innerText = "DANGER"; ast.className = "text-[9px] font-bold px-3 py-1.5 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-500 uppercase tracking-widest"; }

            // 里程碑
            let milestone = `${yrs} 年後財富增長預估。`;
            const targets = [100000, 250000, 500000, 1000000];
            for (let i = 1; i <= yrs; i++) {
                let v = principal * Math.pow(1 + (ret / 100), i);
                let hit = targets.find(t => v >= t && (principal * Math.pow(1 + (ret / 100), i-1)) < t);
                if (hit) { milestone = `🚀 目標突破: $${hit/10000} 萬美金預計在第 ${i} 年達成！`; break; }
            }
            document.getElementById('milestone').innerHTML = milestone;

            // 圖表
            const lbls = [], dta = [];
            for (let i = 0; i <= yrs; i++) { lbls.push(`Y${i}`); dta.push(principal * Math.pow(1 + (ret / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,200); grad.addColorStop(0, 'rgba(16, 185, 129, 0.2)'); grad.addColorStop(1, 'transparent');
            myChart = new Chart(ctx, { type: 'line', data: { labels: lbls, datasets: [{ data: dta, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: {size: 8} } } } } });
        }

        window.onload = () => {
            const d = JSON.parse(localStorage.getItem('winner_v3')) || {c: 48, s: 1602, cur: 77, fx: 31.4, q: 25660};
            document.getElementById('cost_price').value = d.c;
            document.getElementById('current_price').value = d.cur;
            document.getElementById('shares').value = d.s;
            document.getElementById('fx_rate').value = d.fx;
            document.getElementById('qqq_now').value = d.q;
            calculate();
        };
    </script>
</body>
</html>
