<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinnerFlow | 旗艦版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #000000; color: #E2E8F0; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 0 20px rgba(16, 185, 129, 0.05); }
        input[type=number] { background: #0f172a; border: 1px solid #1e293b; color: #fff; text-align: center; border-radius: 12px; outline: none; }
        input[type=number]:focus { border-color: #10b981; }
        input[type=range] { -webkit-appearance: none; background: transparent; height: 30px; }
        input[type=range]::-webkit-slider-runnable-track { background: #1e293b; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: #10b981; margin-top: -8px; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); border: 2px solid #fff; }
        .value-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        #install-banner { display: none; transform: translateY(-100%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #install-banner.show { display: block; transform: translateY(0); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center">

    <div id="install-banner" class="w-full fixed top-0 z-[100] p-4">
        <div class="max-w-xl mx-auto bg-indigo-600 rounded-2xl shadow-2xl p-4 flex justify-between items-center text-white border border-white/20">
            <div class="flex items-center gap-3">
                <img src="icon.png" class="w-12 h-12 rounded-xl shadow-lg border border-white/10">
                <div>
                    <p class="font-black text-sm">WinnerFlow</p>
                    <p class="text-[10px] opacity-80" id="install-txt">將贏家系統安裝至桌面</p>
                </div>
            </div>
            <button id="install-btn" class="bg-white text-indigo-700 px-5 py-2 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-all">立即安裝</button>
            <button onclick="dismissInstall()" class="absolute -top-2 -right-2 bg-slate-800 rounded-full w-6 h-6 text-xs flex items-center justify-center border border-white/20">✕</button>
        </div>
    </div>

    <div class="w-full max-w-5xl px-4 py-6 md:py-10 space-y-6">
        
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-700 p-0.5 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                    <img src="icon.png" class="w-full h-full rounded-[14px] border border-white/10">
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-white italic">WINNER<span class="text-emerald-500">FLOW</span></h1>
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 tracking-widest uppercase">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SYSTEM ACTIVE
                    </div>
                </div>
            </div>
            <button onclick="fetchMarketData()" class="bg-slate-900 border border-slate-700 text-emerald-400 px-6 py-3 rounded-2xl font-black text-xs tracking-widest hover:bg-slate-800 transition-all flex items-center gap-2 active:scale-95">
                <i id="f-icon" class="fa-solid fa-satellite-dish"></i> <span id="f-text">SYNC</span>
            </button>
        </div>

        <div class="lg:flex gap-6 space-y-6 lg:space-y-0">
            <div class="lg:w-5/12 space-y-4">
                <div class="glass-card rounded-[32px] p-6 space-y-6 neon-border">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 tracking-widest uppercase block text-center">買進均價</label>
                            <input type="number" id="cost_price" class="w-full p-4 text-xl font-black" oninput="calculate()">
                        </div>
                        <div class="space-y-2 relative">
                            <label class="text-[10px] font-black text-slate-500 tracking-widest uppercase block text-center">目前市價</label>
                            <input type="number" id="current_price" class="w-full p-4 text-xl font-black text-emerald-400" oninput="calculate()">
                            <span id="roi_badge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 shadow-lg">--%</span>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 tracking-widest uppercase block text-center">持有股數</label>
                            <input type="number" id="shares" class="w-full p-4 text-xl font-black" oninput="calculate()">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-500 tracking-widest uppercase block text-center">即時匯率</label>
                            <input type="number" id="fx_rate" class="w-full p-4 text-xl font-black text-indigo-400" oninput="calculate()">
                        </div>
                    </div>

                    <div class="bg-slate-900/50 p-5 rounded-2xl border border-indigo-900/30">
                        <label class="text-[10px] font-black text-indigo-400 tracking-widest uppercase block mb-3 text-center">QQQ 目前美金水位</label>
                        <input type="number" id="qqq_now" class="w-full bg-transparent border-none text-white text-3xl font-black text-center focus:ring-0" oninput="calculate()">
                    </div>

                    <div class="space-y-6" ontouchstart="hideKeyboard()">
                        <div>
                            <div class="flex justify-between text-[11px] font-black text-slate-400 mb-2">
                                <span>導流比例</span> <span class="text-emerald-500 text-sm"><span id="ratio_val">25</span>%</span>
                            </div>
                            <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="uiInteract(); calculate()">
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div>
                                <label class="text-[11px] font-black text-slate-500 mb-2 block uppercase">年化 (<span id="ret_val">11</span>%)</label>
                                <input type="range" id="expected_return" min="1" max="25" value="11" oninput="uiInteract(); calculate()">
                            </div>
                            <div>
                                <label class="text-[11px] font-black text-slate-500 mb-2 block uppercase">年限 (<span id="yrs_val">5</span>年)</label>
                                <input type="range" id="years" min="1" max="30" value="5" oninput="uiInteract(); calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:w-7/12 space-y-4" ontouchstart="hideKeyboard()">
                <div class="glass-card rounded-[32px] p-6 space-y-6">
                    <div class="flex justify-between items-end">
                        <div>
                            <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase italic">Safety Margin</span>
                            <div id="out_margin_text" class="text-4xl font-black text-white mt-1">--</div>
                        </div>
                        <div id="alert_box" class="text-[10px] font-bold px-4 py-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 uppercase tracking-tighter">系統待命</div>
                    </div>
                    
                    <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                        <div id="margin_bar" class="h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-1">本季淨導流額</span>
                            <span id="out_transfer" class="text-2xl font-black text-emerald-400 value-text">--</span>
                        </div>
                        <div class="bg-slate-900/50 p-5 rounded-2xl border border-white/5">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block mb-1">未來預估資產</span>
                            <span id="out_future" class="text-2xl font-black text-white">--</span>
                        </div>
                    </div>

                    <div class="relative h-48 w-full mt-4">
                        <canvas id="growthChart"></canvas>
                    </div>

                    <div id="milestone_text" class="text-center text-[10px] font-bold text-indigo-400 bg-indigo-500/10 py-3 rounded-xl border border-indigo-500/20 uppercase tracking-widest">
                        分析中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null, deferredPrompt = null;

        // PWA 註冊
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        // PWA 安裝提示
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-banner').classList.add('show');
        });

        const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        if (isIos && !window.navigator.standalone) {
            document.getElementById('install-banner').classList.add('show');
            document.getElementById('install-txt').innerText = "點擊分享 → 加入主畫面";
            document.getElementById('install-btn').style.display = 'none';
        }

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') dismissInstall();
                deferredPrompt = null;
            }
        });
        function dismissInstall() { document.getElementById('install-banner').classList.remove('show'); }

        // 多重備援 API 抓取引擎
        async function fetchMarketData() {
            uiInteract();
            const bT = document.getElementById('f-text'), bI = document.getElementById('f-icon');
            bT.innerText = "CONNECTING"; bI.className = "fa-solid fa-circle-notch fa-spin";
            
            let fx = 31.4, cur = 77;
            let fxOk = false, stkOk = false;

            // 匯率備援：ExchangeRate-API -> Currency-API
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json();
                fx = d.rates.TWD; fxOk = true;
            } catch(e) {
                try {
                    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const d = await r.json();
                    fx = d.usd.twd; fxOk = true;
                } catch(e2) {}
            }

            // 股價備援：TWSE -> Yahoo (via Proxy)
            try {
                const r = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                const d = await r.json();
                const s = d.find(x => x.Code === "0050");
                cur = parseFloat(s.ClosingPrice); stkOk = true;
            } catch(e) {
                try {
                    const u = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW');
                    const r = await fetch(`https://api.allorigins.win/raw?url=${u}`);
                    const d = await r.json();
                    cur = d.chart.result[0].meta.regularMarketPrice; stkOk = true;
                } catch(e2) {}
            }

            document.getElementById('fx_rate').value = fx.toFixed(2);
            document.getElementById('current_price').value = cur;
            calculate();

            bI.className = (fxOk && stkOk) ? "fa-solid fa-check text-emerald-500" : "fa-solid fa-triangle-exclamation text-amber-500";
            bT.innerText = (fxOk && stkOk) ? "SUCCESS" : "PARTIAL";
            setTimeout(() => { bI.className = "fa-solid fa-satellite-dish"; bT.innerText = "SYNC"; }, 2500);
        }

        function hideKeyboard() { if (document.activeElement?.tagName === 'INPUT') document.activeElement.blur(); }
        function uiInteract() { hideKeyboard(); if (navigator.vibrate) navigator.vibrate(8); }

        function calculate() {
            const c = parseFloat(document.getElementById('cost_price').value) || 0;
            const s = parseFloat(document.getElementById('shares').value) || 0;
            const fx= parseFloat(document.getElementById('fx_rate').value) || 1;
            const q = parseFloat(document.getElementById('qqq_now').value) || 0;
            const r = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const ret= parseFloat(document.getElementById('expected_return').value) || 0;
            const y = parseInt(document.getElementById('years').value) || 0;
            const p = parseFloat(document.getElementById('current_price').value) || 0;

            document.getElementById('ratio_val').innerText = r;
            document.getElementById('ret_val').innerText = ret;
            document.getElementById('yrs_val').innerText = y;

            localStorage.setItem('wf_v2', JSON.stringify({c, s, fx, q, p}));

            const profit = (p - c) * s;
            const margin = p > 0 ? (p - c) / p : 0;
            const roi = c > 0 ? ((p - c) / c) * 100 : 0;
            const netUsd = Math.max(0, (profit * (r / 100)) - (profit * (r / 100) * 0.004425 + 850)) / fx;
            const principal = q + (margin > 0.1 ? netUsd : 0);
            const future = principal * Math.pow(1 + (ret / 100), y);

            // 介面更新
            const rb = document.getElementById('roi_badge');
            rb.innerText = (roi > 0 ? '+' : '') + roi.toFixed(1) + '%';
            rb.className = `absolute -bottom-2 left-1/2 -translate-x-1/2 text-[9px] font-black px-2 py-0.5 rounded-full border shadow-lg ${roi >= 0 ? 'bg-emerald-950/50 text-emerald-400 border-emerald-500/30' : 'bg-rose-950/50 text-rose-400 border-rose-500/30'}`;

            document.getElementById('out_margin_text').innerText = (margin * 100).toFixed(2) + '%';
            document.getElementById('out_transfer').innerText = '$ ' + netUsd.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('out_future').innerText = '$ ' + future.toLocaleString(undefined, {maximumFractionDigits:0});

            const mb = document.getElementById('margin_bar'), ab = document.getElementById('alert_box');
            mb.style.width = Math.min(100, Math.max(0, margin * 200)) + '%';
            if (margin >= 0.2) { mb.className = "h-full bg-emerald-500 shadow-[0_0_15px_#10b981]"; ab.innerText = "SAFE TO DIVERT"; ab.className = "text-[10px] font-bold px-4 py-2 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 uppercase tracking-tighter"; }
            else if (margin >= 0.1) { mb.className = "h-full bg-amber-500 shadow-[0_0_15px_#f59e0b]"; ab.innerText = "CAUTION"; ab.className = "text-[10px] font-bold px-4 py-2 rounded-xl bg-amber-500/10 border border-amber-500/30 text-amber-400 uppercase tracking-tighter"; }
            else { mb.className = "h-full bg-rose-500 shadow-[0_0_15px_#f43f5e]"; ab.innerText = "DANGER"; ab.className = "text-[10px] font-bold px-4 py-2 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 uppercase tracking-tighter"; }

            // 里程碑
            let milestone = `${y} 年後預期資產達到目標。`;
            const targets = [100000, 250000, 500000, 1000000];
            for (let i = 1; i <= y; i++) {
                let v = principal * Math.pow(1 + (ret / 100), i);
                let hit = targets.find(t => v >= t && (principal * Math.pow(1 + (ret / 100), i-1)) < t);
                if (hit) { milestone = `🚀 TARGET HIT: $${hit/10000} 萬美金將於第 ${i} 年達成！`; break; }
            }
            document.getElementById('milestone_text').innerHTML = milestone;

            // 圖表
            const lbls = [], dta = [];
            for (let i = 0; i <= y; i++) { lbls.push(`Y${i}`); dta.push(principal * Math.pow(1 + (ret / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,200); grad.addColorStop(0, 'rgba(16, 185, 129, 0.2)'); grad.addColorStop(1, 'transparent');
            myChart = new Chart(ctx, { type: 'line', data: { labels: lbls, datasets: [{ data: dta, borderColor: '#10b981', backgroundColor: grad, fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: {size: 8} } } } } });
        }

        window.onload = () => {
            const d = JSON.parse(localStorage.getItem('wf_v2')) || {c: 48, s: 1602, fx: 31.4, q: 25660, p: 77};
            document.getElementById('cost_price').value = d.c;
            document.getElementById('current_price').value = d.p;
            document.getElementById('shares').value = d.s;
            document.getElementById('fx_rate').value = d.fx;
            document.getElementById('qqq_now').value = d.q;
            calculate();
        };
    </script>
</body>
</html>
