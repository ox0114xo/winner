<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinnerFlow 贏家決策系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        input[type=range] { accent-color: #4f46e5; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 text-gray-800 font-sans p-4 md:p-8 min-h-screen flex justify-center">

    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 h-fit">
        <div class="bg-indigo-900 text-white p-6 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide"><i class="fa-solid fa-shield-halved mr-2"></i>WinnerFlow</h1>
                <p class="text-indigo-200 text-sm mt-1">從台股利潤，灌溉美股成長</p>
            </div>
            <button onclick="fetchMarketData()" class="mt-4 md:mt-0 bg-white/10 hover:bg-white/20 border border-white/30 text-white py-2 px-4 rounded-lg font-bold transition-all flex items-center gap-2">
                <i id="fetch_icon" class="fa-solid fa-rotate"></i>
                <span id="fetch_text">一鍵更新市價與匯率</span>
            </button>
        </div>

        <div class="p-6 md:p-8 md:flex gap-8">
            <div class="md:w-1/2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">0050 買進均價</label>
                        <input type="number" id="cost_price" class="w-full bg-slate-50 border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-indigo-300 font-bold" oninput="calculate()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">0050 目前市價</label>
                        <input type="number" id="current_price" class="w-full bg-slate-50 border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-indigo-300 font-bold text-blue-600" oninput="calculate()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">持有股數</label>
                        <input type="number" id="shares" class="w-full bg-slate-50 border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-indigo-300 font-bold" oninput="calculate()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">匯率 (USD/TWD)</label>
                        <input type="number" id="fx_rate" step="0.1" class="w-full bg-slate-50 border rounded-lg p-2 mt-1 focus:ring-2 focus:ring-indigo-300 font-bold text-green-600" oninput="calculate()">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">QQQ 現有資產 (USD)</label>
                    <input type="number" id="qqq_now" class="w-full bg-indigo-50 border border-indigo-100 rounded-lg p-3 mt-1 font-bold text-lg text-indigo-900 focus:ring-2 focus:ring-indigo-300" oninput="calculate()">
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border space-y-4">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-sm font-bold text-gray-700">獲利導流比例</label>
                            <span class="bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded text-sm"><span id="ratio_val">25</span>%</span>
                        </div>
                        <input type="range" id="transfer_ratio" min="0" max="100" value="25" class="w-full" oninput="calculate()">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-gray-500 uppercase">預期年化</label>
                                <span class="text-sm font-bold text-gray-700"><span id="return_val">11</span>%</span>
                            </div>
                            <input type="range" id="expected_return" min="1" max="25" value="11" class="w-full" oninput="calculate()">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-gray-500 uppercase">預估年限</label>
                                <span class="text-sm font-bold text-gray-700"><span id="years_val">5</span> 年</span>
                            </div>
                            <input type="range" id="years" min="1" max="30" value="5" class="w-full" oninput="calculate()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:w-1/2 flex flex-col space-y-4">
                <div class="bg-white p-4 rounded-xl border border-gray-200">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-sm font-bold text-gray-500">價格安全水位 (護城河)</span>
                        <span id="out_margin_text" class="text-xl font-black">--</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3">
                        <div id="margin_bar" class="h-3 rounded-full transition-all duration-500" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-xl border border-gray-200">
                    <div class="p-4 flex justify-between items-center border-b">
                        <span class="text-sm font-bold text-gray-600">帳面純利潤</span>
                        <span id="out_profit" class="text-lg font-bold">--</span>
                    </div>
                    <div class="p-3 bg-red-50 flex justify-between items-center text-sm border-b">
                        <span class="text-red-500 font-semibold">扣除交易稅/手續費/電匯</span>
                        <span id="out_friction" class="font-bold text-red-600">--</span>
                    </div>
                    <div class="p-4 bg-green-50 flex justify-between items-center rounded-b-xl">
                        <span class="text-sm font-bold text-green-700">可導流淨額 (USD)</span>
                        <span id="out_transfer" class="text-2xl font-black text-green-600">--</span>
                    </div>
                </div>

                <div id="alert_box" class="p-4 rounded-xl font-bold text-sm border-l-4 hidden"></div>

                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center">
                    <div class="text-sm font-bold text-indigo-500 uppercase">未來預估總資產</div>
                    <div id="out_future" class="text-2xl font-black text-indigo-700">--</div>
                </div>

                <div class="flex-grow bg-white rounded-xl p-2 border border-gray-200">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function fmtMny(num, pre = '') {
            return pre + parseFloat(num).toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        // 分離式 API 抓取 (容錯機制)
        async function fetchMarketData() {
            const btnT = document.getElementById('fetch_text'), btnI = document.getElementById('fetch_icon');
            btnT.innerText = "資料同步中..."; btnI.className = "fa-solid fa-circle-notch fa-spin";
            let fxOk = false, stkOk = false;

            // 1. 抓取匯率 (使用穩定 CDN 節點)
            try {
                const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                const d = await r.json();
                if(d.usd && d.usd.twd) { document.getElementById('fx_rate').value = d.usd.twd.toFixed(2); fxOk = true; }
            } catch (e) { console.warn("匯率失敗", e); }

            // 2. 抓取股價 (獨立區塊，壞了不影響匯率)
            try {
                const u = encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/0050.TW');
                const r = await fetch(`https://api.allorigins.win/raw?url=${u}`);
                const d = await r.json();
                const p = d.chart.result[0].meta.regularMarketPrice;
                if(p) { document.getElementById('current_price').value = p; stkOk = true; }
            } catch (e) { console.warn("股價失敗", e); }

            calculate();

            // 狀態判定
            if(fxOk && stkOk) { btnI.className = "fa-solid fa-check text-green-300"; btnT.innerText = "同步完成！"; }
            else if(fxOk || stkOk) { btnI.className = "fa-solid fa-exclamation text-yellow-300"; btnT.innerText = "部分同步完成"; }
            else { btnI.className = "fa-solid fa-xmark text-red-300"; btnT.innerText = "同步失敗"; }

            setTimeout(() => { btnI.className = "fa-solid fa-rotate"; btnT.innerText = "一鍵更新市價與匯率"; }, 2500);
        }

        function calculate() {
            // 1. 安全取值
            const cst = parseFloat(document.getElementById('cost_price').value) || 0;
            const cur = parseFloat(document.getElementById('current_price').value) || 0;
            const shr = parseFloat(document.getElementById('shares').value) || 0;
            const fx  = parseFloat(document.getElementById('fx_rate').value) || 1;
            const qqq = parseFloat(document.getElementById('qqq_now').value) || 0;
            const rat = parseFloat(document.getElementById('transfer_ratio').value) || 0;
            const ret = parseFloat(document.getElementById('expected_return').value) || 0;
            const yrs = parseInt(document.getElementById('years').value) || 0;

            // 2. 立即更新比例文字 (防卡死)
            document.getElementById('ratio_val').innerText = rat;
            document.getElementById('return_val').innerText = ret;
            document.getElementById('years_val').innerText = yrs;

            // 儲存進瀏覽器
            ['cost_price', 'current_price', 'shares', 'fx_rate', 'qqq_now'].forEach(k => localStorage.setItem('wf_'+k, document.getElementById(k).value));

            // 3. 核心邏輯
            const pft = (cur - cst) * shr;
            const mgn = cur > 0 ? (cur - cst) / cur : 0;
            const twd = pft * (rat / 100);
            const fee = twd > 0 ? (twd * 0.003) + (twd * 0.001425) + 800 : 0;
            const net = Math.max(0, twd - fee) / fx;
            const ftr = (qqq + (mgn > 0.1 ? net : 0)) * Math.pow(1 + (ret / 100), yrs);

            // 4. 更新畫面
            document.getElementById('out_profit').innerText = fmtMny(pft, 'NT$ ');
            document.getElementById('out_friction').innerText = fmtMny(fee, '- NT$ ');
            document.getElementById('out_transfer').innerText = fmtMny(net, '$ ');
            document.getElementById('out_future').innerText = fmtMny(ftr, '$ ');

            const mT = document.getElementById('out_margin_text'), mB = document.getElementById('margin_bar');
            mT.innerText = (mgn * 100).toFixed(2) + '%';
            mB.style.width = Math.max(0, Math.min(mgn * 200, 100)) + '%';
            
            const ab = document.getElementById('alert_box');
            ab.style.display = 'block';
            if (mgn >= 0.2) { mB.className="h-3 rounded-full bg-green-500"; mT.className="text-xl font-black text-green-600"; ab.className="p-3 rounded-lg text-sm bg-green-50 text-green-800 border-l-4 border-green-500"; ab.innerHTML="✅ 水位安全，建議導流。"; }
            else if (mgn >= 0.1) { mB.className="h-3 rounded-full bg-yellow-400"; mT.className="text-xl font-black text-yellow-600"; ab.className="p-3 rounded-lg text-sm bg-yellow-50 text-yellow-800 border-l-4 border-yellow-500"; ab.innerHTML="⚠️ 護城河縮減，請評估降低比例。"; }
            else { mB.className="h-3 rounded-full bg-red-500"; mT.className="text-xl font-black text-red-600"; ab.className="p-3 rounded-lg text-sm bg-red-50 text-red-800 border-l-4 border-red-500"; ab.innerHTML="🚨 停看聽：利潤過低或虧損，暫停導流。"; }

            // 5. 更新圖表
            const lbls = [], dta = [];
            for (let i = 0; i <= yrs; i++) { lbls.push(`第${i}年`); dta.push((qqq + (mgn > 0.1 ? net : 0)) * Math.pow(1 + (ret / 100), i)); }
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            let grad = ctx.createLinearGradient(0,0,0,300); grad.addColorStop(0, 'rgba(79,70,229,0.3)'); grad.addColorStop(1, 'transparent');
            myChart = new Chart(ctx, { type: 'line', data: { labels: lbls, datasets: [{ data: dta, borderColor: '#4f46e5', backgroundColor: grad, fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false } } } });
        }

        window.onload = () => {
            const defs = { cost_price: 48, current_price: 77, shares: 1602, fx_rate: 31.4, qqq_now: 25660 };
            ['cost_price', 'current_price', 'shares', 'fx_rate', 'qqq_now'].forEach(k => { const s = localStorage.getItem('wf_'+k); document.getElementById(k).value = s !== null ? s : defs[k]; });
            calculate();
        };
    </script>
</body>
</html>
