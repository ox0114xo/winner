<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinnerFlow 2.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --accent:#10b981;
  --bg:#0f172a;
}
body{
  background:var(--bg);
  color:white;
  font-family:system-ui;
}
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:1.5rem;
  padding:1.5rem;
}
.kpi{
  font-weight:900;
  font-size:2.2rem;
}
.progress{
  height:10px;
  border-radius:10px;
  overflow:hidden;
  background:#1e293b;
}
.progress-bar{
  height:100%;
  background:var(--accent);
}
button{
  transition:0.2s;
}
button:active{
  transform:scale(0.95);
}
</style>
</head>

<body class="p-4 max-w-5xl mx-auto space-y-6">

<!-- NAV -->
<div class="flex gap-2 text-sm font-bold">
<button onclick="switchTab('home')" class="px-4 py-2 rounded-xl bg-emerald-500 text-black">首頁</button>
<button onclick="switchTab('invest')" class="px-4 py-2 rounded-xl bg-slate-700">投資管理</button>
<button onclick="switchTab('analysis')" class="px-4 py-2 rounded-xl bg-slate-700">收益分析</button>
<button onclick="switchTab('record')" class="px-4 py-2 rounded-xl bg-slate-700">紀錄成就</button>
</div>

<!-- HOME -->
<div id="tab-home" class="space-y-6">

<!-- KPI -->
<div class="card space-y-4">
<div>
<div class="text-xs text-slate-400">總資產</div>
<div id="totalAsset" class="kpi">--</div>
</div>

<div>
<div class="text-xs text-slate-400">今日損益</div>
<div id="todayPnL" class="text-xl font-black text-emerald-400">--</div>
</div>

<div>
<div class="flex justify-between text-xs mb-1">
<span>目標達成率</span>
<span id="goalPercent">--%</span>
</div>
<div class="progress">
<div id="goalBar" class="progress-bar" style="width:0%"></div>
</div>
</div>
</div>

<!-- 戰況卡 -->
<div class="card space-y-3">
<div class="text-sm font-bold">戰況分析</div>
<div id="aiAdvice" class="text-lg font-black text-emerald-400">--</div>
<div class="text-sm">
投資壓力值：
<span id="stressValue" class="font-black">--</span>
</div>
</div>

<!-- 成長圖 -->
<div class="card">
<canvas id="growthChart" height="100"></canvas>
</div>

</div>

<!-- INVEST -->
<div id="tab-invest" class="hidden space-y-6">
<div class="card space-y-4">
<div class="grid grid-cols-2 gap-4">
<div>
<label class="text-xs">持有資產</label>
<input id="assetInput" type="number" class="w-full p-2 rounded bg-slate-800">
</div>
<div>
<label class="text-xs">目標金額</label>
<input id="goalInput" type="number" class="w-full p-2 rounded bg-slate-800">
</div>
<div>
<label class="text-xs">預期年化 %</label>
<input id="returnInput" type="number" class="w-full p-2 rounded bg-slate-800">
</div>
<div>
<label class="text-xs">投資年限</label>
<input id="yearInput" type="number" class="w-full p-2 rounded bg-slate-800">
</div>
</div>
<button onclick="calculate()" class="w-full bg-emerald-500 text-black py-2 rounded-xl font-black">更新計算</button>
</div>
</div>

<!-- ANALYSIS -->
<div id="tab-analysis" class="hidden space-y-6">
<div class="card">
<div class="text-sm font-bold mb-3">股息試算</div>
<input id="dividendInput" type="number" placeholder="輸入年度股息" class="w-full p-2 rounded bg-slate-800">
<div class="mt-3 text-lg font-black" id="dividendAfterTax">--</div>
</div>
</div>

<!-- RECORD -->
<div id="tab-record" class="hidden space-y-6">
<div class="card">
<div class="text-sm font-bold mb-3">成就系統</div>
<ul id="achievements" class="space-y-2 text-sm"></ul>
</div>
</div>

<script>
let chart;

function switchTab(tab){
document.querySelectorAll("[id^='tab-']").forEach(el=>el.classList.add("hidden"));
document.getElementById("tab-"+tab).classList.remove("hidden");
}

function animateNumber(id,value){
let el=document.getElementById(id);
let start=0;
let duration=800;
let startTime=null;
function step(timestamp){
if(!startTime) startTime=timestamp;
let progress=Math.min((timestamp-startTime)/duration,1);
el.textContent=Math.floor(progress*(value-start)+start).toLocaleString();
if(progress<1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

function calculate(){
let asset=parseFloat(assetInput.value)||0;
let goal=parseFloat(goalInput.value)||1;
let rate=(parseFloat(returnInput.value)||5)/100;
let years=parseInt(yearInput.value)||5;

localStorage.setItem("wfData",JSON.stringify({asset,goal,rate,years}));

let percent=Math.min(100,(asset/goal)*100);
goalBar.style.width=percent+"%";
goalPercent.textContent=percent.toFixed(1)+"%";

animateNumber("totalAsset",asset);

let future=asset*Math.pow(1+rate,years);
todayPnL.textContent="預估未來資產 "+future.toLocaleString();

let stress=Math.min(100, (asset/goal)*50 + years*2);
stressValue.textContent=stress.toFixed(0)+" / 100";

if(stress<40) aiAdvice.textContent="SAFE 穩健成長";
else if(stress<70) aiAdvice.textContent="注意風險控管";
else aiAdvice.textContent="壓力偏高 建議調整";

renderChart(asset,rate,years);
checkAchievements(asset);
}

function renderChart(asset,rate,years){
let labels=[];
let data=[];
for(let i=0;i<=years;i++){
labels.push("Y"+i);
data.push(asset*Math.pow(1+rate,i));
}
if(chart) chart.destroy();
chart=new Chart(growthChart,{
type:"line",
data:{labels:labels,datasets:[{data:data,borderColor:"#10b981",fill:false}]},
options:{plugins:{legend:{display:false}},scales:{y:{display:false}}}
});
}

function checkAchievements(asset){
let list=[];
if(asset>=1000000) list.push("🥇 資產突破百萬");
if(asset>=5000000) list.push("🏆 資產突破五百萬");
if(asset>=10000000) list.push("👑 千萬資產達成");
achievements.innerHTML=list.map(a=>"<li>"+a+"</li>").join("");
}

dividendInput?.addEventListener("input",()=>{
let val=parseFloat(dividendInput.value)||0;
let after=val*0.72;
dividendAfterTax.textContent="扣稅後 "+after.toLocaleString();
});

window.onload=()=>{
let saved=JSON.parse(localStorage.getItem("wfData"));
if(saved){
assetInput.value=saved.asset;
goalInput.value=saved.goal;
returnInput.value=saved.rate*100;
yearInput.value=saved.years;
calculate();
}
};
</script>

</body>
</html>
